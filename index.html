<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">

<title>Delimitation Reality Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
/* ================= BASE ================= */
body{
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  height:100vh;
  overflow:hidden;
}
body.lang-te{
  font-family: "Noto Sans Telugu", Arial, sans-serif;
}

/* ================= DESKTOP (NO DRIFT) ================= */
@media (min-width:768px){
  body{ display:flex; }

  #panel{
    width:340px;
    height:100vh;
    overflow-y:auto;
    background:#fff;
    padding:14px;
    z-index:1000;
  }

  #map{
    flex:1;
    height:100vh;
  }
}

/* ================= MOBILE DRAG PANEL ================= */
@media (max-width:768px){

  #map{
    position:absolute;
    top:0; left:0;
    width:100%;
    height:100vh;
  }

  #panel{
    position:fixed;
    left:0; right:0; bottom:0;
    height:75vh;
    background:#fff;
    border-radius:16px 16px 0 0;
    z-index:1000;
    transform:translateY(calc(75vh - 90px));
    transition:transform 0.25s ease;
    overflow-y:auto;
    padding:24px 12px 12px;
  }

  .panel-handle{
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    width:44px;
    height:5px;
    background:#bbb;
    border-radius:10px;
  }
}

/* ================= LABELS ================= */
.state-label div, .ut-label div{
  pointer-events:none;
  white-space:nowrap;
  text-shadow:0 0 4px rgba(255,255,255,0.9);
  font-weight:600;
}

.badge{
  background:#eee;
  padding:2px 6px;
  border-radius:6px;
}
.small{ font-size:12px; opacity:0.8; }

</style>
</head>

<body>

<div id="panel">
<div class="panel-handle"></div>

<b>🇮🇳 Delimitation Reality Dashboard</b>

<select id="mode" onchange="updateMap(true)">
<option value="current">Current (543)</option>
<option value="uniform">Uniform (850)</option>
<option value="y2011">2011 Census</option>
<option value="y2026">2026 Projection</option>
</select>

<select id="lang" onchange="setLang(this.value)">
<option value="en">English</option>
<option value="te">తెలుగు</option>
</select>

<hr>
<div id="totals"></div>
<div id="insights"></div>
<div id="topMovers"></div>
</div>

<div id="map"></div>

<script>
// ================= NORMALIZATION =================
function normalizeName(n){
  const map={
    "Andaman & Nicobar":"Andaman and Nicobar Islands",
    "Andaman":"Andaman and Nicobar Islands",
    "Nicobar":"Andaman and Nicobar Islands",
    "Dadra & Nagar Haveli":"Dadra and Nagar Haveli and Daman and Diu",
    "Daman & Diu":"Dadra and Nagar Haveli and Daman and Diu",
    "Dadra Nagar Haveli":"Dadra and Nagar Haveli and Daman and Diu"
  };
  return map[n] || n;
}

// ================= TELUGU =================
const TELUGU={
"Uttar Pradesh":"ఉత్తర ప్రదేశ్","Maharashtra":"మహారాష్ట్ర",
"Andaman and Nicobar Islands":"అండమాన్ నికోబార్ దీవులు",
"Dadra and Nagar Haveli and Daman and Diu":"దాద్రా నాగర్ హవేలి & దమన్ దియు"
};

function t(n){
  let lang=document.getElementById("lang").value;
  return lang==="te" ? (TELUGU[n]||n) : n;
}

function setLang(lang){
  document.body.classList.toggle("lang-te", lang==="te");
  updateMap(false);
}

// ================= DATA =================
const CURRENT={
"Uttar Pradesh":80,"Maharashtra":48,"West Bengal":42,"Bihar":40,
"Tamil Nadu":39,"Madhya Pradesh":29,"Karnataka":28,"Gujarat":26,
"Andhra Pradesh":25,"Rajasthan":25,"Odisha":21,"Kerala":20,
"Telangana":17,"Assam":14,"Jharkhand":14,"Punjab":13,"Chhattisgarh":11,
"Haryana":10,"Delhi":7,"Jammu and Kashmir":5,
"Himachal Pradesh":4,"Uttarakhand":5,"Goa":2,"Tripura":2,
"Meghalaya":2,"Manipur":2,"Nagaland":1,"Arunachal Pradesh":2,
"Mizoram":1,"Sikkim":1,"Andaman and Nicobar Islands":1,"Chandigarh":1,
"Ladakh":1,"Lakshadweep":1,"Puducherry":1,
"Dadra and Nagar Haveli and Daman and Diu":2
};

const POP_2011={ /* KEEP YOUR FULL POP DATA HERE */ };
const POP_UT={ /* KEEP YOUR FULL UT POP DATA HERE */ };

// ================= ALLOCATION (UNCHANGED CORE LOGIC) =================
function allocate(pop,total){
 let sum=Object.values(pop).reduce((a,b)=>a+b,0);
 let base={},rem=[];
 for(let s in pop){
   let q=(pop[s]/sum)*total;
   base[s]=Math.floor(q);
   rem.push({s,frac:q-base[s]});
 }
 let left=total-Object.values(base).reduce((a,b)=>a+b,0);
 rem.sort((a,b)=>b.frac-a.frac);
 for(let i=0;i<left;i++) base[rem[i].s]++;
 return base;
}

// ================= MODELS (KEEP YOUR ORIGINAL FULL DEFINITIONS) =================
// (You already had MODEL_2011, MODEL_2026, UNIFORM → keep same)

// ================= MAP =================
const map=L.map('map',{zoomControl:true}).setView([22.5,80],5);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// FIX: prevent drift
map.on('zoomend moveend resize',()=>map.invalidateSize());

// ================= LAYERS =================
let geoLayer,labelLayer=L.layerGroup().addTo(map);

// ================= COLOR =================
function getColor(s){
 let h=0;
 for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h);
 return `hsl(${h%360},45%,70%)`;
}

// ================= DATA SELECT =================
function getData(){
 let m=document.getElementById("mode").value;
 if(m==="current") return CURRENT;
 if(m==="uniform") return UNIFORM;
 if(m==="y2011") return MODEL_2011;
 return MODEL_2026;
}

// ================= UPDATE =================
function updateMap(){
 let data=getData();

 let diffs=[];
 for(let s in CURRENT){
   let d=(data[s]||0)-(CURRENT[s]||0);
   diffs.push({s,d});
 }
 diffs.sort((a,b)=>b.d-a.d);

 document.getElementById("totals").innerHTML="Total: "+Object.values(data).reduce((a,b)=>a+b,0);

 document.getElementById("insights").innerHTML=
 "Biggest Gain: <span class='badge'>"+t(diffs[0].s)+"</span><br>"+
 "Biggest Loss: <span class='badge'>"+t(diffs[diffs.length-1].s)+"</span>";

 document.getElementById("topMovers").innerHTML=
 "<b>Top Gainers</b><br>"+
 diffs.slice(0,3).map(x=>t(x.s)+" ▲"+x.d).join("<br>");

 geoLayer.eachLayer(l=>{
   let s=normalizeName(l.feature.properties.ST_NM);
   let val=data[s] ?? CURRENT[s] ?? 0;
   let diff=val-(CURRENT[s]||0);

   let color=diff>0?"#00c853":diff<0?"#1e88e5":"#999";
   let weight=Math.abs(diff)>=5?4:2;

   l.setStyle({
     fillColor:getColor(s),
     fillOpacity:0.75,
     color:color,
     weight:weight
   });

   l.bindTooltip(`<b>${t(s)}</b><br>Seats: ${val}<br>Δ ${diff>=0?"+":""}${diff}`);
 });

 addLabels(data);
}

// ================= LABELS (NO DUPLICATES) =================
function addLabels(data){
 labelLayer.clearLayers();
 let seen=new Set();

 geoLayer.eachLayer(l=>{
   let s=normalizeName(l.feature.properties.ST_NM);
   if(seen.has(s)) return;
   seen.add(s);

   let c=l.getBounds().getCenter();
   let val=data[s] ?? CURRENT[s] ?? 0;

   L.marker(c,{
     icon:L.divIcon({
       className:"state-label",
       html:`<div>${t(s)}<br><b>${val}</b></div>`
     })
   }).addTo(labelLayer);
 });
}

// ================= DRAG PANEL (STABLE) =================
function initDragPanel(){
  if(window.innerWidth >= 768) return;

  const panel=document.getElementById("panel");
  let startY=0,current=0,drag=false;
  let collapsed=window.innerHeight*0.75-90;
  let expanded=0, currentY=collapsed;

  function set(y){ panel.style.transform=`translateY(${y}px)`; }

  panel.addEventListener("touchstart",e=>{
    if(panel.scrollTop>5) return;
    drag=true;
    startY=e.touches[0].clientY;
    panel.style.transition="none";
  });

  window.addEventListener("touchmove",e=>{
    if(!drag) return;
    let dy=e.touches[0].clientY-startY;
    let next=currentY+dy;
    if(next<expanded) next=expanded;
    if(next>collapsed) next=collapsed;
    set(next);
  },{passive:false});

  window.addEventListener("touchend",()=>{
    if(!drag) return;
    drag=false;
    panel.style.transition="transform 0.25s ease";
    currentY=(currentY>collapsed/2)?collapsed:expanded;
    set(currentY);
  });
}

// ================= LOAD =================
fetch('india_states.geojson')
.then(r=>r.json())
.then(g=>{
 geoLayer=L.geoJSON(g,{
   style:{color:"#333",weight:1,fillOpacity:0.6}
 }).addTo(map);

 updateMap();
 initDragPanel();
});
</script>

</body>
</html>
