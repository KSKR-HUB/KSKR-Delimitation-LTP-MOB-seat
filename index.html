<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">
<title>Delimitation Reality Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial, sans-serif; display:flex; height:100vh; overflow:hidden; }
body.lang-te { font-family: "Noto Sans Telugu", sans-serif; }

.panel {
  width:340px; background:rgba(255,255,255,0.95); padding:15px; border-right:1px solid #ddd;
  overflow-y:auto; z-index:1000; box-shadow:2px 0 10px rgba(0,0,0,0.1);
}

#map { flex-grow:1; position:relative; }

/* TOP MOVERS ANIMATION */
.poly-gainer { animation: polyPulseGainer 2s infinite alternate ease-in-out; }
.poly-loser { animation: polyPulseLoser 2s infinite alternate ease-in-out; }

@keyframes polyPulseGainer {
  0% { filter: drop-shadow(0 0 2px #00c853); }
  100% { filter: drop-shadow(0 0 10px #00c853) brightness(1.1); }
}
@keyframes polyPulseLoser {
  0% { filter: drop-shadow(0 0 2px #1e88e5); }
  100% { filter: drop-shadow(0 0 10px #1e88e5) brightness(1.1); }
}

.state-label { background:none; border:none; }
.label-box {
  text-align:center; font-weight:600; color:#111; text-shadow:0 0 4px #fff;
  pointer-events:none; min-width:80px;
}

.top-mover-gainer, .top-mover-loser {
  background: rgba(255,255,255,0.9); padding: 4px 8px; border-radius: 6px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.2); display: inline-block;
}
.top-mover-gainer { border: 2px solid #00c853; animation: labelPulse 1.5s infinite alternate; }
.top-mover-loser { border: 2px solid #1e88e5; animation: labelPulse 1.5s infinite alternate; }

@keyframes labelPulse {
  0% { transform: scale(1); } 100% { transform: scale(1.1); }
}

.row { margin-bottom:12px; }
.badge { display:inline-block; padding:3px 8px; background:#eee; border-radius:4px; font-weight:bold; }
hr { border:0; border-top:1px solid #eee; margin:15px 0; }
</style>
</head>

<body>
<div class="panel" id="panel">
  <h3 id="dashTitle">🇮🇳 Delimitation Dashboard</h3>
  <div class="row">
    <select id="mode" onchange="updateMap()">
      <option value="current" id="opt-current">Current (1971)</option>
      <option value="uniform" id="opt-uniform" selected>Uniform Model (+55%)</option>
      <option value="y2011" id="opt-2011">2011 Census</option>
      <option value="y2026" id="opt-2026">2026 Projection</option>
    </select>
  </div>
  <div class="row">
    <select id="lang" onchange="updateMap()">
      <option value="en">English</option>
      <option value="te">తెలుగు</option>
    </select>
  </div>
  <hr>
  <div id="stats"></div>
  <hr>
  <div id="topMovers"></div>
  <hr>
  <div id="validation" style="font-size:12px; color:#666;"></div>
</div>
<div id="map"></div>

<script>
const TELUGU = {
  "Uttar Pradesh":"ఉత్తర ప్రదేశ్","Maharashtra":"మహారాష్ట్ర","West Bengal":"పశ్చిమ బెంగాల్",
  "Bihar":"బీహార్","Tamil Nadu":"తమిళనాడు","Madhya Pradesh":"మధ్యప్రదేశ్",
  "Karnataka":"కర్ణాటక","Gujarat":"గుజరాత్","Andhra Pradesh":"ఆంధ్ర ప్రదేశ్",
  "Telangana":"తెలంగాణ","Kerala":"కేరళ","Odisha":"ఒడిశా","Rajasthan":"రాజస్థాన్",
  "Punjab":"పంజాబ్","Haryana":"హర్యానా","Delhi":"దిల్లీ","Jammu and Kashmir":"జమ్మూ కాశ్మీర్",
  "Ladakh":"లడఖ్","Assam":"అస్సాం","Jharkhand":"ఝార్ఖండ్","Chhattisgarh":"ఛత్తీస్‌గఢ్",
  "Goa":"గోవా","Tripura":"త్రిపుర","Meghalaya":"మేఘాలయ","Manipur":"మణిపూర్",
  "Nagaland":"నాగాలాండ్","Arunachal Pradesh":"అరుణాచల్ ప్రదేశ్","Mizoram":"మిజోరం",
  "Sikkim":"సిక్కిం","Puducherry":"పుదుచ్చేరి","Lakshadweep":"లక్షద్వీప్",
  "Chandigarh":"చండీగఢ్","Andaman and Nicobar Islands":"అండమాన్ నికోబార్ దీవులు",
  "Dadra and Nagar Haveli and Daman and Diu":"దాద్రా నాగర్ హవేలి",
  "Himachal Pradesh": "హిమాచల్ ప్రదేశ్", "Uttarakhand": "ఉత్తరాఖండ్"
};

const UI = {
  en: { total: "Total Seats", gainers: "Top Gainers", losers: "Top Losers", val: "Validation", gain: "Max Gain" },
  te: { total: "మొత్తం సీట్లు", gainers: "లాభపడిన రాష్ట్రాలు", losers: "నష్టపోయిన రాష్ట్రాలు", val: "ధృవీకరణ", gain: "అత్యధిక లాభం" }
};

const LABEL_CENTERS = {
  "Uttarakhand": [30.1, 79.2], "Uttar Pradesh": [26.9, 80.8], "Tamil Nadu": [10.8, 78.4],
  "Kerala": [10.2, 76.3], "Andhra Pradesh": [15.8, 79.8], "West Bengal": [24.0, 87.7],
  "Lakshadweep": [10.6, 72.6], "Andaman and Nicobar Islands": [11.7, 92.7]
};

const CURRENT = {"Uttar Pradesh":80,"Maharashtra":48,"West Bengal":42,"Bihar":40,"Tamil Nadu":39,"Madhya Pradesh":29,"Karnataka":28,"Gujarat":26,"Andhra Pradesh":25,"Rajasthan":25,"Odisha":21,"Kerala":20,"Telangana":17,"Assam":14,"Jharkhand":14,"Punjab":13,"Chhattisgarh":11,"Haryana":10,"Delhi":7,"Jammu and Kashmir":5,"Himachal Pradesh":4,"Uttarakhand":5,"Goa":2,"Tripura":2,"Meghalaya":2,"Manipur":2,"Nagaland":1,"Arunachal Pradesh":2,"Mizoram":1,"Sikkim":1,"Andaman and Nicobar Islands":1,"Chandigarh":1,"Ladakh":1,"Lakshadweep":1,"Puducherry":1,"Dadra and Nagar Haveli and Daman and Diu":2};
const UNIFORM = {"Uttar Pradesh":124,"Maharashtra":75,"West Bengal":65,"Bihar":62,"Tamil Nadu":61,"Madhya Pradesh":45,"Karnataka":43,"Gujarat":40,"Andhra Pradesh":39,"Rajasthan":39,"Odisha":33,"Kerala":31,"Telangana":26,"Assam":22,"Jharkhand":22,"Punjab":20,"Chhattisgarh":17,"Haryana":16,"Delhi":15,"Jammu and Kashmir":11,"Himachal Pradesh":6,"Uttarakhand":8,"Goa":3,"Tripura":3,"Meghalaya":3,"Manipur":3,"Nagaland":2,"Arunachal Pradesh":3,"Mizoram":2,"Sikkim":2,"Andaman and Nicobar Islands":1,"Chandigarh":2,"Ladakh":1,"Lakshadweep":1,"Puducherry":2,"Dadra and Nagar Haveli and Daman and Diu":3};
const MODEL_2011 = {"Uttar Pradesh":145,"Maharashtra":82,"West Bengal":66,"Bihar":76,"Tamil Nadu":52,"Madhya Pradesh":53,"Karnataka":44,"Gujarat":44,"Andhra Pradesh":36,"Rajasthan":50,"Odisha":31,"Kerala":24,"Telangana":26,"Assam":23,"Jharkhand":24,"Punjab":20,"Chhattisgarh":19,"Haryana":18,"Delhi":12,"Jammu and Kashmir":9,"Himachal Pradesh":5,"Uttarakhand":7,"Goa":1,"Tripura":3,"Meghalaya":2,"Manipur":2,"Nagaland":1,"Arunachal Pradesh":1,"Mizoram":1,"Sikkim":1,"Andaman and Nicobar Islands":1,"Chandigarh":1,"Ladakh":1,"Lakshadweep":1,"Puducherry":1,"Dadra and Nagar Haveli and Daman and Diu":1};
const MODEL_2026 = {"Uttar Pradesh":166,"Maharashtra":82,"West Bengal":64,"Bihar":87,"Tamil Nadu":45,"Madhya Pradesh":54,"Karnataka":42,"Gujarat":43,"Andhra Pradesh":34,"Rajasthan":52,"Odisha":29,"Kerala":21,"Telangana":24,"Assam":22,"Jharkhand":24,"Punjab":19,"Chhattisgarh":18,"Haryana":17,"Delhi":15,"Jammu and Kashmir":11,"Himachal Pradesh":5,"Uttarakhand":6,"Goa":1,"Tripura":2,"Meghalaya":2,"Manipur":2,"Nagaland":1,"Arunachal Pradesh":1,"Mizoram":1,"Sikkim":1,"Andaman and Nicobar Islands":1,"Chandigarh":2,"Ladakh":1,"Lakshadweep":1,"Puducherry":2,"Dadra and Nagar Haveli and Daman and Diu":0};

function normalizeName(n) {
  if(!n) return "";
  const m = {"NCT of Delhi":"Delhi","Arunachal Prades":"Arunachal Pradesh","Andaman & Nicobar Islands":"Andaman and Nicobar Islands"};
  return m[n] || n;
}

const map = L.map('map').setView([22.5, 80], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
let geoLayer, labelLayer = L.layerGroup().addTo(map);

fetch('india_states.geojson').then(r=>r.json()).then(data=>{
  geoLayer = L.geoJSON(data, {
    style: (f) => ({ fillColor: '#ccc', weight: 1, color: '#666', fillOpacity: 0.7 })
  }).addTo(map);
  updateMap();
});

function updateMap() {
  const mode = document.getElementById("mode").value;
  const lang = document.getElementById("lang").value;
  const data = (mode==="current")?CURRENT:(mode==="uniform")?UNIFORM:(mode==="y2011")?MODEL_2011:MODEL_2026;
  const baseline = (mode==="uniform")?CURRENT:UNIFORM;
  const u = UI[lang];

  let diffs = [];
  for(let s in data) {
    let d = data[s] - baseline[s];
    diffs.push({ s, d });
  }
  diffs.sort((a,b)=>b.d - a.d);

  const gainers = new Set(diffs.slice(0,3).map(x=>x.s));
  const losers = new Set(mode==="current" ? [] : [...diffs].reverse().slice(0,3).filter(x=>x.d < 0).map(x=>x.s));

  labelLayer.clearLayers();
  let seenStates = new Set();

  geoLayer.eachLayer(layer => {
    let name = normalizeName(layer.feature.properties.ST_NM || layer.feature.properties.NAME_1);
    if(seenStates.has(name)) return;
    seenStates.add(name);

    let val = data[name] || 0;
    let d = (data[name] || 0) - (baseline[name] || 0);
    let isG = gainers.has(name), isL = losers.has(name);

    layer.setStyle({
      fillColor: isG ? '#81c784' : isL ? '#64b5f6' : '#bdbdbd',
      color: isG ? '#00c853' : isL ? '#1e88e5' : '#777',
      weight: (isG || isL) ? 3 : 1,
      className: isG ? 'poly-gainer' : isL ? 'poly-loser' : ''
    });

    let center = LABEL_CENTERS[name] ? L.latLng(LABEL_CENTERS[name]) : layer.getBounds().getCenter();
    let displayLabel = (lang === "te") ? (TELUGU[name] || name) : name;
    
    let metric = (isG || isL) ? `<div style="font-size:11px; margin-top:2px;">${d > 0 ? '▲' : '▼'} ${Math.abs(d)}</div>` : "";

    L.marker(center, {
      icon: L.divIcon({
        className: 'state-label',
        html: `<div class="label-box ${isG?'top-mover-gainer':isL?'top-mover-loser':''}">
                <div style="font-size:10px">${displayLabel}</div>
                <div style="font-size:13px; font-weight:bold">${val}</div>
                ${metric}
              </div>`
      })
    }).addTo(labelLayer);
  });

  // UI Panel updates
  document.getElementById("stats").innerHTML = `<b>${u.total}:</b> ${Object.values(data).reduce((a,b)=>a+b,0)}<br>
    ${u.gain}: <span class="badge">${(lang==="te"?TELUGU[diffs[0].s]:diffs[0].s)} (+${diffs[0].d})</span>`;
  
  let moversHtml = `<b>${u.gainers}</b><br>` + diffs.slice(0,3).map(x=>`${lang==='te'?TELUGU[x.s]:x.s} <span style="color:green">+${x.d}</span>`).join("<br>");
  if(losers.size > 0) {
    moversHtml += `<hr><b>${u.losers}</b><br>` + [...diffs].reverse().slice(0,3).map(x=>`${lang==='te'?TELUGU[x.s]:x.s} <span style="color:blue">${x.d}</span>`).join("<br>");
  }
  document.getElementById("topMovers").innerHTML = moversHtml;
  document.getElementById("validation").innerHTML = `✔ ${u.val}: ${Object.values(data).reduce((a,b)=>a+b,0)} / 850`;
}
</script>
</body>
</html>
