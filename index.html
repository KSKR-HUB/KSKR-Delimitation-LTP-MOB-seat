<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">
<title>Delimitation Reality Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial, sans-serif; display:flex; height:100vh; overflow:hidden; }
body.lang-te { font-family: "Noto Sans Telugu", sans-serif; }

#map { position: absolute; top: 0; left: 0; right: 0; bottom: 0; z-index: 1; transition: left 0.25s ease; }

.panel {
  position: absolute; top: 0; left: 0; width: 320px; height: 100vh;
  background: rgba(255,255,255,0.95); z-index: 1000; overflow-y: auto;
  box-shadow: 2px 0 15px rgba(0,0,0,0.1); padding: 15px; box-sizing: border-box;
  transition: transform 0.25s ease;
}

#toggleBtn {
  position: fixed; top: 20px; left: 10px; width: 36px; height: 36px;
  background: #fff; border: 1px solid #ddd; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 9999;
}

.row { margin-top: 10px; }
.small { font-size: 11px; opacity: 0.8; line-height: 1.4; }
hr { border: none; border-top: 1px solid #eee; margin: 15px 0; }
.badge { display: inline-block; padding: 2px 6px; border-radius: 4px; background: #f2f2f2; font-weight: bold; }

@media (max-width: 768px) {
  .panel { width: 100%; height: 75vh; top: auto; bottom: 0; border-radius: 20px 20px 0 0; }
  #map { height: 100vh; width: 100%; }
  #toggleBtn { display: none; }
}

.state-label div { pointer-events: none; text-shadow: 0 0 4px #fff; font-weight: bold; }
</style>
</head>

<body>
<div id="toggleBtn">⬅</div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <b style="font-size: 16px;">🇮🇳 Delimitation Dashboard</b>
  
  <div class="row">
    <select id="mode" style="width:100%; padding: 5px;">
      <option value="current">Current (543)</option>
      <option value="uniform">Uniform (850)</option>
      <option value="y2011">2011 Census (850)</option>
      <option value="y2026">2026 Projection (850)</option>
    </select>
  </div>

  <div class="row">
    <select id="lang" style="width:100%; padding: 5px;">
      <option value="en">English</option>
      <option value="te">తెలుగు</option>
    </select>
  </div>

  <hr><div id="totals"></div><div id="modelName" class="small"></div>
  <hr><b id="shareTitle">📊 Share</b><div id="share" class="small"></div>
  <hr><b id="voteTitle">⚖️ Vote Weight</b><div id="vote" class="small"></div>
  <hr><b id="insightsTitle">🔥 Insights</b><div id="insights" class="small"></div>
  <hr><b id="topMoversTitle">🏆 Top Movers</b><div id="topMovers" class="small"></div>
  <hr><b id="validationTitle">🧪 Validation</b><div id="validation" class="small"></div>
  <hr><div class="small" id="legendBox"></div>
</div>

<div id="map"></div>

<script>
// ================== DATA ==================
const CURRENT = {"Uttar Pradesh":80,"Maharashtra":48,"West Bengal":42,"Bihar":40,"Tamil Nadu":39,"Madhya Pradesh":29,"Karnataka":28,"Gujarat":26,"Andhra Pradesh":25,"Rajasthan":25,"Odisha":21,"Kerala":20,"Telangana":17,"Assam":14,"Jharkhand":14,"Punjab":13,"Chhattisgarh":11,"Haryana":10,"Delhi":7,"Jammu and Kashmir":5,"Himachal Pradesh":4,"Uttarakhand":5,"Goa":2,"Tripura":2,"Meghalaya":2,"Manipur":2,"Nagaland":1,"Arunachal Pradesh":2,"Mizoram":1,"Sikkim":1,"Andaman and Nicobar Islands":1,"Chandigarh":1,"Ladakh":1,"Lakshadweep":1,"Puducherry":1,"Dadra and Nagar Haveli and Daman and Diu":2};
const POP_2011 = {"Uttar Pradesh":199812341,"Maharashtra":112374333,"Bihar":104099452,"West Bengal":91276115,"Madhya Pradesh":72626809,"Tamil Nadu":72147030,"Rajasthan":68548437,"Karnataka":61095297,"Gujarat":60439692,"Andhra Pradesh":49577103,"Telangana":35193978,"Odisha":41974218,"Kerala":33406061,"Jharkhand":32988134,"Assam":31205576,"Punjab":27743338,"Chhattisgarh":25545198,"Haryana":25351462,"Himachal Pradesh":6864602,"Uttarakhand":10086292,"Goa":1458545,"Tripura":3673917,"Meghalaya":2966889,"Manipur":2855794,"Nagaland":1978502,"Arunachal Pradesh":1383727,"Mizoram":1097206,"Sikkim":610577};
const POP_UT = {"Delhi":16787941, "Jammu and Kashmir":12541302,"Ladakh":274000,"Chandigarh":1055450,"Puducherry":1247953,"Lakshadweep":64473,"Andaman and Nicobar Islands":380581,"Dadra and Nagar Haveli and Daman and Diu":586956};
const UT_BOX={"Delhi":[[28.4,76.9],[28.9,77.5]],"Chandigarh":[[30.6,76.7],[30.8,76.9]],"Puducherry":[[11.8,79.7],[12.0,80.0]],"Lakshadweep":[[10.4,72.5],[10.8,72.8]],"Andaman and Nicobar Islands":[[10,92],[13,94]],"Ladakh":[[33.5,76],[35.5,79]],"Dadra and Nagar Haveli and Daman and Diu":[[20,72.8],[20.4,73.2]]};

const STATE_TOTAL = 815; const UT_TOTAL = 35;
const SOUTH = ["Tamil Nadu","Kerala","Karnataka","Andhra Pradesh","Telangana"];

// ================== UTILS ==================
function normalizeName(s) {
  const m = {"Jammu & Kashmir":"Jammu and Kashmir","NCT of Delhi":"Delhi","Andaman & Nicobar Islands":"Andaman and Nicobar Islands","Orissa":"Odisha"};
  return m[s] || (s || "").trim();
}

const TELUGU = {"Uttar Pradesh":"ఉత్తర ప్రదేశ్","Maharashtra":"మహారాష్ట్ర","West Bengal":"పశ్చిమ బెంగాల్","Bihar":"బీహార్","Tamil Nadu":"తమిళనాడు","Madhya Pradesh":"మధ్యప్రదేశ్","Karnataka":"కర్ణాటక","Gujarat":"గుజరాత్","Andhra Pradesh":"ఆంధ్ర ప్రదేశ్","Telangana":"తెలంగాణ","Kerala":"కేరళ","Odisha":"ఒడిశా","Rajasthan":"రాజస్థాన్","Punjab":"పంజాబ్","Haryana":"హర్యానా","Delhi":"దిల్లీ","Jammu and Kashmir":"జమ్మూ కాశ్మీర్","Ladakh":"లడఖ్","Assam":"అస్సాం","Jharkhand":"ఝార్ఖండ్","Chhattisgarh":"ఛత్తీస్‌గఢ్","Goa":"గోవా","Tripura":"త్రిపుర","Meghalaya":"మేఘాలయ","Manipur":"మణిపూర్","Nagaland":"నాగాలాండ్","Arunachal Pradesh":"అరుణాచల్ ప్రదేశ్","Mizoram":"మిజోరం","Sikkim":"సిక్కిం","Puducherry":"పుదుచ్చేరి","Lakshadweep":"లక్షద్వీప్","Chandigarh":"చండీగఢ్","Andaman and Nicobar Islands":"అండమాన్ నికోబార్ దీవులు","Dadra and Nagar Haveli and Daman and Diu":"దాద్రా నాగర్ హవేలి & దమన్ దియు"};
function t(s) { return (document.getElementById("lang").value === "te") ? (TELUGU[s] || s) : s; }

const UI = {
  en: { total:"Total", model:"Model", shareTitle:"Share (South vs North)", south:"South", north:"North", vote:"Vote Weight", gain:"Biggest Gain", loss:"Biggest Loss", gainers:"Top Gainers", losers:"Top Losers", validation:"Validation", seats:"Seats", deltaCurrent:"Δ vs Current", deltaUniform:"Δ vs Uniform", legendGain:"Border Green = Gain", legendLoss:"Border Blue = Loss" },
  te: { total:"మొత్తం", model:"మోడల్", shareTitle:"వాటా (దక్షిణం vs ఉత్తరం)", south:"దక్షిణం", north:"ఉత్తరం", vote:"ఓటు బరువు", gain:"అత్యధిక లాభం", loss:"అత్యధిక నష్టం", gainers:"లాభపడినవి", losers:"నష్టపోయినవి", validation:"ధృవీకరణ", seats:"సీట్లు", deltaCurrent:"ప్రస్తుతంతో మార్పు", deltaUniform:"సమానత్వంతో మార్పు", legendGain:"ఆకుపచ్చ = లాభం", legendLoss:"నీలం = నష్టం" }
};

// ================== LOGIC ==================
function allocate(pop, total) {
  let sum = Object.values(pop).reduce((a,b)=>a+b, 0);
  let base = {}, rem = [];
  for(let s in pop) {
    let q = (pop[s]/sum)*total;
    base[s] = Math.floor(q);
    rem.push({s, frac: q-base[s]});
  }
  let left = total - Object.values(base).reduce((a,b)=>a+b, 0);
  rem.sort((a,b)=>b.frac - a.frac);
  for(let i=0; i<left; i++) base[rem[i].s]++;
  return base;
}

function buildUTModel(popBase) {
  let ratio = Object.values(popBase).reduce((a,b)=>a+b, 0) / STATE_TOTAL;
  let base = {}; let rem = []; let used = 0;
  for(let s in POP_UT) { base[s] = CURRENT[s] || 1; used += base[s]; rem.push({s, q: POP_UT[s]/ratio}); }
  let left = UT_TOTAL - used;
  rem.sort((a,b)=>b.q - a.q);
  for(let i=0; i<left; i++) base[rem[i%rem.length].s]++;
  return base;
}

const MODEL_2011_S = allocate(POP_2011, STATE_TOTAL);
const UT_2011 = buildUTModel(POP_2011);
const MODEL_2011 = {...MODEL_2011_S, ...UT_2011};

const POP_2026 = (function(){
  let o={}; for(let s in POP_2011){ let g=(s==="Uttar Pradesh"||s==="Bihar")?1.25:(s==="Tamil Nadu"||s==="Kerala")?1.08:1.18; o[s]=Math.round(POP_2011[s]*g); } return o;
})();
const MODEL_2026_S = allocate(POP_2026, STATE_TOTAL);
const UT_2026 = buildUTModel(POP_2026);
const MODEL_2026 = {...MODEL_2026_S, ...UT_2026};

const UNIFORM_S = allocate(POP_2011, STATE_TOTAL);
const UNIFORM = {...UNIFORM_S, ...UT_2011};

// ================== MAP INIT ==================
const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([22.5, 80], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer, utLayer = L.layerGroup().addTo(map), labelLayer = L.layerGroup().addTo(map);

fetch('india_states.geojson').then(r=>r.json()).then(g=>{
  geoLayer = L.geoJSON(g, {
    style: { color: "#333", weight: 1, fillOpacity: 0.7 }
  }).addTo(map);
  updateMap();
});

// ================== UPDATE CORE ==================
function updateMap() {
  const mode = document.getElementById("mode").value;
  const lang = document.getElementById("lang").value;
  const u = UI[lang];
  const data = (mode==="current")?CURRENT:(mode==="uniform")?UNIFORM:(mode==="y2011")?MODEL_2011:MODEL_2026;
  const baseline = (mode==="uniform")?CURRENT:UNIFORM;

  let movers = [];
  geoLayer.eachLayer(layer => {
    const s = normalizeName(layer.feature.properties.ST_NM || layer.feature.properties.NAME_1);
    const val = data[s] || 0;
    const diff = val - (baseline[s] || 0);
    movers.push({s, diff, val});

    layer.setStyle({
      fillColor: `hsl(${Math.abs(s.length*15)%360}, 50%, 75%)`,
      color: diff > 0 ? "#00c853" : diff < 0 ? "#1e88e5" : "#333",
      weight: diff !== 0 ? 3 : 1
    });
    layer.bindTooltip(`<b>${t(s)}</b>: ${val} ${u.seats}`, { sticky: true });
  });

  // UT Visuals
  utLayer.clearLayers();
  for(let s in UT_BOX) {
    const val = data[s] || 0;
    L.rectangle(UT_BOX[s], { color: "#333", weight: 1, fillColor: "#ddd", fillOpacity: 0.8 }).addTo(utLayer)
     .bindTooltip(`<b>${t(s)}</b>: ${val}`, { sticky: true });
  }

  // Label Management
  labelLayer.clearLayers();
  if(map.getZoom() >= 5) {
    geoLayer.eachLayer(layer => {
      const s = normalizeName(layer.feature.properties.ST_NM || layer.feature.properties.NAME_1);
      L.marker(layer.getBounds().getCenter(), {
        icon: L.divIcon({ className: 'state-label', html: `<div>${data[s] || ''}</div>` }),
        interactive: false
      }).addTo(labelLayer);
    });
  }

  // Update Panel Info
  document.getElementById("totals").innerHTML = `<b>${u.total}:</b> ${Object.values(data).reduce((a,b)=>a+b,0)}`;
  
  let sSeats = 0, tot = 0;
  for(let s in data) { tot += data[s]; if(SOUTH.includes(s)) sSeats += data[s]; }
  let sPct = (sSeats/tot*100).toFixed(1);
  document.getElementById("share").innerHTML = `${u.south}: ${sPct}% | ${u.north}: ${(100-sPct).toFixed(1)}%`;

  const upW = Math.round((POP_2026["Uttar Pradesh"])/(data["Uttar Pradesh"]||80));
  const klW = Math.round((POP_2026["Kerala"])/(data["Kerala"]||20));
  document.getElementById("vote").innerHTML = `UP MP ≈ ${upW.toLocaleString()}<br>Kerala MP ≈ ${klW.toLocaleString()}`;

  movers.sort((a,b) => b.diff - a.diff);
  const gains = movers.filter(x => x.diff > 0).slice(0,3);
  const loss = [...movers].sort((a,b) => a.diff - b.diff).filter(x => x.diff < 0).slice(0,3);

  document.getElementById("insights").innerHTML = `${u.gain}: ${gains[0]?.s ? t(gains[0].s) : '-'} <br> ${u.loss}: ${loss[0]?.s ? t(loss[0].s) : '-'}`;
  document.getElementById("topMovers").innerHTML = gains.map(x=>`<span style="color:green">▲ ${t(x.s)} (+${x.diff})</span>`).join("<br>") + "<br>" + loss.map(x=>`<span style="color:blue">▼ ${t(x.s)} (${x.diff})</span>`).join("<br>");

  document.getElementById("legendBox").innerHTML = `<div>${u.legendGain}</div><div>${u.legendLoss}</div>`;
  document.body.className = lang === 'te' ? 'lang-te' : '';
}

// ================== UI EVENTS ==================
document.getElementById("mode").onchange = updateMap;
document.getElementById("lang").onchange = updateMap;
map.on('zoomend', updateMap);

const tBtn = document.getElementById("toggleBtn");
const pnl = document.getElementById("panel");
const mpEl = document.getElementById("map");
tBtn.onclick = () => {
  const isH = pnl.style.transform === "translateX(-100%)";
  pnl.style.transform = isH ? "translateX(0)" : "translateX(-100%)";
  mpEl.style.left = isH ? "320px" : "0";
  tBtn.innerHTML = isH ? "⬅" : "➡";
  setTimeout(()=>map.invalidateSize(), 300);
};

if(window.innerWidth >= 768) {
  mpEl.style.left = "320px";
}
</script>
</body>
</html>
