<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">
<title>Delimitation Reality Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial, Helvetica, sans-serif; display:flex; height:100vh; overflow:hidden; }
body.lang-te { font-family: "Noto Sans Telugu", "Noto Sans", Arial, sans-serif; }

.panel{
  width:360px; background:rgba(255,255,255,0.92); backdrop-filter: blur(8px);
  padding:14px; box-shadow:2px 0 18px rgba(0,0,0,0.15); border-right:1px solid rgba(0,0,0,0.06);
  font-size:13px; overflow-y:auto; z-index: 1000; transition: transform 0.25s ease;
}

#map { flex:1; height:100%; position: relative; transition: margin-left 0.25s ease; }

/* Desktop Tweaks */
@media (min-width: 768px){
  #map { position: absolute !important; top: 0; bottom: 0; right: 0; left: 320px !important; }
  .panel { position: absolute; top: 0; left: 0; width: 320px; height: 100vh; }
}

/* Mobile Tweaks */
@media (max-width: 768px){
  body { flex-direction: column; overflow: auto; }
  #map { height: 100vh; width: 100%; position: absolute !important; }
  .panel { position: fixed; top: 0; left: 0; right: 0; width: 100%; height: 80vh; border-radius: 0 0 16px 16px; transform: translateY(0); touch-action: none; }
  #toggleBtn { display: none; }
}

#toggleBtn{
  position: fixed; top: 20px; left: 10px; width: 36px; height: 36px; background: #fff;
  border: 1px solid #ddd; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 9999;
}

.row{margin-top:6px}
.small{font-size:11px; opacity:0.8}
hr{border:none;border-top:1px solid #eee;margin:10px 0}
.badge{display:inline-block; padding:2px 6px; border-radius:6px; background:#f2f2f2}

.state-label div, .ut-label div {
  pointer-events:none; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:80px; text-shadow: 0 0 4px rgba(255,255,255,0.9); font-weight: bold;
}
</style>
</head>

<body>
<div id="toggleBtn">⬅</div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <b>🇮🇳 Delimitation Reality Dashboard</b>
  <div class="row">
    <select id="mode" onchange="updateMap(true)" style="width:100%;">
      <option value="current">Current (543)</option>
      <option value="uniform">Uniform (850)</option>
      <option value="y2011">2011 Census</option>
      <option value="y2026">2026 Projection</option>
    </select>
  </div>
  <div class="row small">Language</div>
  <div class="row">
    <select id="lang" onchange="setLang(this.value)" style="width:100%;">
      <option value="en">English</option>
      <option value="te">తెలుగు</option>
    </select>
  </div>
  <hr><div id="totals"></div><div id="modelName" class="small"></div>
  <hr><b id="shareTitle">📊 Share</b><div id="share" class="small"></div>
  <hr><b id="voteTitle">⚖️ Vote Weight</b><div id="vote" class="small"></div>
  <hr><b id="insightsTitle">🔥 Key Insights</b><div id="insights" class="small"></div>
  <hr><b id="topMoversTitle">🏆 Top Movers</b><div id="topMovers" class="small"></div>
  <hr><b id="validationTitle">🧪 Validation</b><div id="validation" class="small"></div>
  <hr><div class="legend" id="legendBox"></div>
</div>

<div id="map"></div>

<script>
// ================== DATA & LOGIC ==================
const CURRENT = {"Uttar Pradesh":80,"Maharashtra":48,"West Bengal":42,"Bihar":40,"Tamil Nadu":39,"Madhya Pradesh":29,"Karnataka":28,"Gujarat":26,"Andhra Pradesh":25,"Rajasthan":25,"Odisha":21,"Kerala":20,"Telangana":17,"Assam":14,"Jharkhand":14,"Punjab":13,"Chhattisgarh":11,"Haryana":10,"Delhi":7,"Jammu and Kashmir":5,"Himachal Pradesh":4,"Uttarakhand":5,"Goa":2,"Tripura":2,"Meghalaya":2,"Manipur":2,"Nagaland":1,"Arunachal Pradesh":2,"Mizoram":1,"Sikkim":1,"Andaman and Nicobar Islands":1,"Chandigarh":1,"Ladakh":1,"Lakshadweep":1,"Puducherry":1,"Dadra and Nagar Haveli and Daman and Diu":2};
const POP_2011 = {"Uttar Pradesh":199812341,"Maharashtra":112374333,"Bihar":104099452,"West Bengal":91276115,"Madhya Pradesh":72626809,"Tamil Nadu":72147030,"Rajasthan":68548437,"Karnataka":61095297,"Gujarat":60439692,"Andhra Pradesh":49577103,"Telangana":35193978,"Odisha":41974218,"Kerala":33406061,"Jharkhand":32988134,"Assam":31205576,"Punjab":27743338,"Chhattisgarh":25545198,"Haryana":25351462,"Himachal Pradesh":6864602,"Uttarakhand":10086292,"Goa":1458545,"Tripura":3673917,"Meghalaya":2966889,"Manipur":2855794,"Nagaland":1978502,"Arunachal Pradesh":1383727,"Mizoram":1097206,"Sikkim":610577};
const POP_UT = {"Delhi":16787941, "Jammu and Kashmir":12541302,"Ladakh":274000,"Chandigarh":1055450,"Puducherry":1247953,"Lakshadweep":64473,"Andaman and Nicobar Islands":380581,"Dadra and Nagar Haveli and Daman and Diu":586956};

const TOTAL_850 = 850, UT_TOTAL = 35, STATE_TOTAL = 815;
const SOUTH = ["Tamil Nadu","Kerala","Karnataka","Andhra Pradesh","Telangana"];
const EXCLUDE_SENSITIVITY = ["Delhi","Jammu and Kashmir"];

function normalizeName(name){
  const map = {"Jammu & Kashmir":"Jammu and Kashmir","NCT of Delhi":"Delhi","Andaman & Nicobar Islands":"Andaman and Nicobar Islands","Orissa":"Odisha"};
  return map[name] || (name||"").trim();
}

function allocate(pop,total){
  let sum=Object.values(pop).reduce((a,b)=>a+b,0);
  let base={},rem=[];
  for(let s in pop){
    let q=(pop[s]/sum)*total;
    base[s]=Math.floor(q);
    rem.push({s,frac:q-base[s]});
  }
  let left=total-Object.values(base).reduce((a,b)=>a+b,0);
  rem.sort((a,b)=>b.frac-a.frac);
  for(let i=0;i<left;i++) base[rem[i].s]++;
  return base;
}

function getRatio(pop, totalSeats){
  return Object.values(pop).reduce((a,b)=>a+b,0) / totalSeats;
}

function allocateUTSeats(popUT, ratio, targetTotal){
  let base = {}; let rem = []; let used = 0;
  for(let s in popUT){
    base[s] = CURRENT[s] || 1;
    used += base[s];
    rem.push({s, frac: popUT[s] / ratio});
  }
  let remaining = targetTotal - used;
  rem.sort((a,b)=>b.frac - a.frac);
  let i = 0;
  while(remaining > 0){
    base[rem[i % rem.length].s]++;
    remaining--; i++;
  }
  return base;
}

function buildUTModel(popBase){
  return allocateUTSeats(POP_UT, getRatio(popBase, STATE_TOTAL), UT_TOTAL);
}

function mergeStatesWithUTs(stateModel, utModel){
  let out = {};
  for(let s in CURRENT){
    if(stateModel[s] !== undefined) out[s] = stateModel[s];
    else if(utModel[s] !== undefined) out[s] = utModel[s];
    else out[s] = CURRENT[s];
  }
  return out;
}

// Pre-calculate Models
const MODEL_2011_STATES = allocate(POP_2011, STATE_TOTAL);
const MODEL_2011 = mergeStatesWithUTs(MODEL_2011_STATES, buildUTModel(POP_2011));

function project2026(){
  let out={};
  for(let s in POP_2011){
    let g = (s==="Uttar Pradesh"||s==="Bihar") ? 1.25 : (s==="Tamil Nadu"||s==="Kerala") ? 1.08 : 1.18;
    out[s]=Math.round(POP_2011[s]*g);
  }
  return out;
}
const POP_2026 = project2026();
const MODEL_2026 = mergeStatesWithUTs(allocate(POP_2026, STATE_TOTAL), buildUTModel(POP_2026));

const CURRENT_STATES = {};
for(let s in CURRENT) if(s in POP_2011) CURRENT_STATES[s] = CURRENT[s];
const UNIFORM = mergeStatesWithUTs(allocate(CURRENT_STATES, STATE_TOTAL), buildUTModel(POP_2011));

// ================== UI & LANGUAGE ==================
const TELUGU = {"Uttar Pradesh":"ఉత్తర ప్రదేశ్","Maharashtra":"మహారాష్ట్ర","West Bengal":"పశ్చిమ బెంగాల్","Bihar":"బీహార్","Tamil Nadu":"తమిళనాడు","Madhya Pradesh":"మధ్యప్రదేశ్","Karnataka":"కర్ణాటక","Gujarat":"గుజరాత్","Andhra Pradesh":"ఆంధ్ర ప్రదేశ్","Telangana":"తెలంగాణ","Kerala":"కేరళ","Odisha":"ఒడిశా","Rajasthan":"రాజస్థాన్","Punjab":"పంజాబ్","Haryana":"హర్యానా","Delhi":"దిల్లీ","Jammu and Kashmir":"జమ్మూ కాశ్మీర్","Ladakh":"లడఖ్","Assam":"అస్సాం","Jharkhand":"ఝార్ఖండ్","Chhattisgarh":"ఛత్తీస్‌గఢ్","Goa":"గోవా","Tripura":"త్రిపుర","Meghalaya":"మేఘాలయ","Manipur":"మణిపూర్","Nagaland":"నాగాలాండ్","Arunachal Pradesh":"అరుణాచల్ ప్రదేశ్","Mizoram":"మిజోరం","Sikkim":"సిక్కిం","Puducherry":"పుదుచ్చేరి","Lakshadweep":"లక్షద్వీప్","Chandigarh":"చండీగఢ్","Andaman and Nicobar Islands":"అండమాన్ నికోబార్ దీవులు","Dadra and Nagar Haveli and Daman and Diu":"దాద్రా నాగర్ హవేలి & దమన్ దియు"};
function t(name){ return (document.getElementById("lang").value === "te") ? (TELUGU[name] || name) : name; }

const UI = {
  en: { total:"Total", model:"Model", gain:"Biggest Gain", loss:"Biggest Loss", gainers:"Top Gainers", losers:"Top Losers", shareTitle:"Share (South vs North)", standard:"Standard", sensitivity:"Sensitivity", south:"South", north:"North", vote:"Vote Weight", validation:"Validation", seats:"Seats", modelLabel:"Model", deltaCurrent:"Δ vs Current", deltaUniform:"Δ vs Uniform", share:"Share", shareDelta:"Share Δ", legendGain:"Border = Gain", legendLoss:"Border = Loss", legendFill:"Fill = State", legendBase:"Baseline: Uniform vs Current | 2011/2026 vs Uniform" },
  te: { total:"మొత్తం", model:"మోడల్", gain:"అత్యధిక లాభం", loss:"అత్యధిక నష్టం", gainers:"లాభపడినవి", losers:"నష్టపోయినవి", shareTitle:"వాటా (దక్షిణం vs ఉత్తరం)", standard:"సాధారణ", sensitivity:"సెన్సిటివిటీ", south:"దక్షిణం", north:"ఉత్తరం", vote:"ఓటు బరువు", validation:"ధృవీకరణ", seats:"సీట్లు", modelLabel:"మోడల్", deltaCurrent:"ప్రస్తుతంతో మార్పు", deltaUniform:"యూనిఫాం మార్పు", share:"వాటా", shareDelta:"వాటా మార్పు", legendGain:"సరిహద్దు = లాభం", legendLoss:"సరిహద్దు = నష్టం", legendFill:"రంగు = రాష్ట్రం", legendBase:"ఆధారం: సమాన పంపిణీ vs ప్రస్తుత" }
};

function ui(){ return UI[document.getElementById("lang").value]; }

// ================== MAP & UPDATE ==================
const map = L.map('map', {zoomControl:true, attributionControl:false}).setView([22.5,80],5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer, utLayer = L.layerGroup().addTo(map), labelLayer = L.layerGroup().addTo(map), labelTimer;
const UT_BOX={"Delhi":[[28.4,76.9],[28.9,77.5]],"Chandigarh":[[30.6,76.7],[30.8,76.9]],"Puducherry":[[11.8,79.7],[12.0,80.0]],"Lakshadweep":[[10.4,72.5],[10.8,72.8]],"Andaman and Nicobar Islands":[[10,92],[13,94]],"Ladakh":[[33.5,76],[35.5,79]],"Dadra and Nagar Haveli and Daman and Diu":[[20,72.8],[20.4,73.2]]};

function getColor(s){ let h=0; for(let i=0;i<s.length;i++) h=s.charCodeAt(i)+((h<<5)-h); return `hsl(${Math.abs(h)%360},45%,70%)`; }

function updateMap(flag){
  let mode = document.getElementById("mode").value;
  let lang = document.getElementById("lang").value;
  let data = (mode==="current")?CURRENT:(mode==="uniform")?UNIFORM:(mode==="y2011")?MODEL_2011:MODEL_2026;
  let baseline = (mode==="uniform") ? CURRENT : UNIFORM;
  let u = ui();

  let diffs = [];
  geoLayer.eachLayer(layer => {
    let s = normalizeName(layer.feature.properties.ST_NM || layer.feature.properties.NAME_1);
    let val = data[s] || 0;
    let bVal = baseline[s] || 0;
    let d = val - bVal;
    diffs.push({s, diff: d});

    layer.setStyle({ fillColor: getColor(s), fillOpacity: 0.8, color: d > 0 ? "#00c853" : d < 0 ? "#1e88e5" : "#999", weight: 3 });
    layer.bindTooltip(`<b>${t(s)}</b>: ${val}`, {sticky:true});
  });

  utLayer.clearLayers();
  for(let s in UT_BOX){
    L.rectangle(UT_BOX[s], {color:"#333", weight:2, fillColor:getColor(s), fillOpacity:0.8}).addTo(utLayer)
     .bindTooltip(`<b>${t(s)}</b>: ${data[s]||0}`, {sticky:true});
  }

  // Update Stats Panel
  document.body.classList.toggle("lang-te", lang === "te");
  document.getElementById("totals").innerHTML = `<b>${u.total}:</b> ${Object.values(data).reduce((a,b)=>a+b,0)}`;
  
  // Calculate Top Movers
  let sorted = [...diffs].sort((a,b)=>b.diff - a.diff);
  let gainers = sorted.slice(0,3).filter(x=>x.diff>0);
  let losers = [...sorted].reverse().slice(0,3).filter(x=>x.diff<0);

  document.getElementById("insights").innerHTML = `${u.gain}: <span class="badge">${t(sorted[0].s)}</span><br>${u.loss}: <span class="badge">${t(sorted[sorted.length-1].s)}</span>`;
  document.getElementById("topMovers").innerHTML = gainers.map(x=>`🟢 ${t(x.s)} (+${x.diff})`).join("<br>") + "<hr>" + losers.map(x=>`🔵 ${t(x.s)} (${x.diff})`).join("<br>");

  // Share Calculations
  let south = 0, totalSeats = 0;
  for(let s in data) { if(s in POP_2011) { totalSeats += data[s]; if(SOUTH.includes(s)) south += data[s]; } }
  let shareVal = (south/totalSeats*100).toFixed(1);
  document.getElementById("share").innerHTML = `${u.south}: ${shareVal}% | ${u.north}: ${(100-shareVal).toFixed(1)}%`;

  // Vote Weight
  let upMP = Math.round(POP_2026["Uttar Pradesh"] / (data["Uttar Pradesh"] || 1));
  let klMP = Math.round(POP_2026["Kerala"] / (data["Kerala"] || 1));
  document.getElementById("vote").innerHTML = `UP MP ≈ ${upMP.toLocaleString()}<br>Kerala MP ≈ ${klMP.toLocaleString()}`;

  document.getElementById("validation").innerHTML = `${u.validation}: ${Object.values(data).reduce((a,b)=>a+b,0)} / ${(mode==="current"?543:850)}`;
  
  addLabels(data);
}

function addLabels(data){
  labelLayer.clearLayers();
  if(map.getZoom() < 5) return;
  geoLayer.eachLayer(l => {
    let s = normalizeName(l.feature.properties.ST_NM || l.feature.properties.NAME_1);
    L.marker(l.getBounds().getCenter(), {
      icon: L.divIcon({ className: "state-label", html: `<div>${t(s)}<br><b>${data[s]||0}</b></div>` }),
      interactive: false
    }).addTo(labelLayer);
  });
}

fetch('india_states.geojson').then(r=>r.json()).then(g=>{
  geoLayer = L.geoJSON(g).addTo(map);
  updateMap();
});

// ================== UI HELPERS ==================
function setLang(l){ document.getElementById("lang").value = l; updateMap(); }
const btn = document.getElementById("toggleBtn");
const panel = document.getElementById("panel");
btn.onclick = () => {
  let isH = panel.style.transform === "translateX(-100%)";
  panel.style.transform = isH ? "translateX(0)" : "translateX(-100%)";
  document.getElementById("map").style.left = isH ? "320px" : "0";
  btn.innerHTML = isH ? "⬅" : "➡";
  setTimeout(()=>map.invalidateSize(), 300);
};
</script>
</body>
</html>
