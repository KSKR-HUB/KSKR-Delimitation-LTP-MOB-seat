<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">
<title>Delimitation Reality Dashboard</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; font-family: Arial, Helvetica, sans-serif; display:flex; height:100vh; overflow:hidden; }
body.lang-te { font-family: "Noto Sans Telugu", "Noto Sans", Arial, sans-serif; }

/* PANEL & LAYOUT */
.panel {
  width:360px; background:rgba(255,255,255,0.98); padding:15px; 
  box-shadow:2px 0 15px rgba(0,0,0,0.1); z-index: 1000; overflow-y:auto; 
  transition: transform 0.3s ease; position: relative;
}

#map { flex:1; height:100%; position: relative; z-index: 1; }

@media (min-width: 768px) {
  #map { position: absolute !important; left: 360px !important; right: 0; top: 0; bottom: 0; }
  .panel { height: 100vh; position: absolute; left: 0; top: 0; }
}

@media (max-width: 768px) {
  body { flex-direction: column; }
  #map { height: 100vh; width: 100%; position: absolute !important; }
  .panel { position: fixed; bottom: 0; left: 0; right: 0; width: 100%; height: 60vh; border-radius: 15px 15px 0 0; transform: translateY(0); }
  #toggleBtn { display: none; }
}

#toggleBtn {
  position: fixed; top: 20px; left: 10px; width: 34px; height: 34px; background: #fff;
  border: 1px solid #ccc; border-radius: 50%; display: flex; align-items: center;
  justify-content: center; cursor: pointer; z-index: 9999; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

/* LABEL STYLING - PREVENTS DRIFT & OVERLAP */
.state-label div {
  pointer-events:none; white-space:nowrap; text-align:center;
  font-weight:700; font-size:10px; line-height: 1;
  text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff;
}

.row { margin-top:8px; }
.small { font-size:11px; opacity:0.85; line-height: 1.4; }
hr { border:none; border-top:1px solid #eee; margin:12px 0; }
</style>
</head>

<body>
<div id="toggleBtn">⬅</div>
<div class="panel" id="panel">
  <b>🇮🇳 Delimitation Reality Dashboard</b>
  
  <div class="row">
    <select id="mode" onchange="updateMap()" style="width:100%; padding:4px;">
      <option value="current">Current (543)</option>
      <option value="uniform">Uniform (850)</option>
      <option value="y2011">2011 Census</option>
      <option value="y2026">2026 Projection</option>
    </select>
  </div>

  <div class="row">
    <select id="lang" onchange="setLang(this.value)" style="width:100%; padding:4px;">
      <option value="en">English</option>
      <option value="te">తెలుగు</option>
    </select>
  </div>

  <hr><div id="totals"></div>
  <hr><b>📊 Share (South vs North)</b><div id="share" class="small"></div>
  <hr><b>⚖️ Vote Weight (People per MP)</b><div id="vote" class="small"></div>
  <hr><b>🏆 Top Movers</b><div id="topMovers" class="small"></div>
  <hr><b>🧪 Validation</b><div id="validation" class="small"></div>
  <hr><div id="legend" class="small"></div>
</div>

<div id="map"></div>

<script>
// --- DATA & CALCULATIONS ---
const CURRENT = {"Uttar Pradesh":80,"Maharashtra":48,"West Bengal":42,"Bihar":40,"Tamil Nadu":39,"Madhya Pradesh":29,"Karnataka":28,"Gujarat":26,"Andhra Pradesh":25,"Rajasthan":25,"Odisha":21,"Kerala":20,"Telangana":17,"Assam":14,"Jharkhand":14,"Punjab":13,"Chhattisgarh":11,"Haryana":10,"Delhi":7,"Jammu and Kashmir":5,"Himachal Pradesh":4,"Uttarakhand":5,"Goa":2,"Tripura":2,"Meghalaya":2,"Manipur":2,"Nagaland":1,"Arunachal Pradesh":2,"Mizoram":1,"Sikkim":1,"Andaman and Nicobar Islands":1,"Chandigarh":1,"Ladakh":1,"Lakshadweep":1,"Puducherry":1,"Dadra and Nagar Haveli and Daman and Diu":2};
const POP_2011 = {"Uttar Pradesh":199812341,"Maharashtra":112374333,"Bihar":104099452,"West Bengal":91276115,"Madhya Pradesh":72626809,"Tamil Nadu":72147030,"Rajasthan":68548437,"Karnataka":61095297,"Gujarat":60439692,"Andhra Pradesh":49577103,"Telangana":35193978,"Odisha":41974218,"Kerala":33406061,"Jharkhand":32988134,"Assam":31205576,"Punjab":27743338,"Chhattisgarh":25545198,"Haryana":25351462,"Himachal Pradesh":6864602,"Uttarakhand":10086292,"Goa":1458545,"Tripura":3673917,"Meghalaya":2966889,"Manipur":2855794,"Nagaland":1978502,"Arunachal Pradesh":1383727,"Mizoram":1097206,"Sikkim":610577};
const SOUTH = ["Tamil Nadu","Kerala","Karnataka","Andhra Pradesh","Telangana"];

function allocate(pop, total) {
  let sum = Object.values(pop).reduce((a, b) => a + b, 0);
  let base = {}, rem = [];
  for (let s in pop) {
    let q = (pop[s] / sum) * total;
    base[s] = Math.floor(q);
    rem.push({ s, frac: q - base[s] });
  }
  let left = total - Object.values(base).reduce((a, b) => a + b, 0);
  rem.sort((a, b) => b.frac - a.frac);
  for (let i = 0; i < left; i++) base[rem[i].s]++;
  return base;
}

const UNIFORM = allocate(CURRENT, 850);
const MODEL_2011 = allocate(POP_2011, 850);

// --- MAP INIT ---
const map = L.map('map', {attributionControl:false}).setView([22.5, 80], 5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);
let geoLayer, labelLayer = L.layerGroup().addTo(map);

const TELUGU = {"Uttar Pradesh":"ఉత్తర ప్రదేశ్","Maharashtra":"మహారాష్ట్ర","West Bengal":"పశ్చిమ బెంగాల్","Bihar":"బీహార్","Tamil Nadu":"తమిళనాడు","Madhya Pradesh":"మధ్యప్రదేశ్","Karnataka":"కర్ణాటక","Gujarat":"గుజరాత్","Andhra Pradesh":"ఆంధ్ర ప్రదేశ్","Telangana":"తెలంగాణ","Kerala":"కేరళ","Odisha":"ఒడిశా","Rajasthan":"రాజస్థాన్"};
function t(n) { return document.getElementById("lang").value === "te" ? (TELUGU[n] || n) : n; }

function updateMap() {
  const mode = document.getElementById("mode").value;
  const data = mode === "current" ? CURRENT : mode === "uniform" ? UNIFORM : MODEL_2011;
  const baseline = mode === "uniform" ? CURRENT : UNIFORM;

  // CRITICAL: Clear all markers before redrawing to fix duplication
  labelLayer.clearLayers();

  geoLayer.eachLayer(l => {
    let s = l.feature.properties.ST_NM || l.feature.properties.NAME_1;
    let val = data[s] || 0;
    let bVal = baseline[s] || 0;
    let diff = val - bVal;

    l.setStyle({
      fillColor: `hsl(${Math.abs(s.length * 30) % 360}, 60%, 80%)`,
      fillOpacity: 0.7, weight: 1.5,
      color: diff > 0 ? "#2e7d32" : diff < 0 ? "#1565c0" : "#777"
    });

    l.bindTooltip(`<b>${t(s)}</b>: ${val} (${diff >= 0 ? '+' : ''}${diff})`);

    // Label Placement Fix
    let center;
    if (s === "Kerala") center = [10.5, 76.5]; // Manual overrides for tricky shapes
    else if (s === "Tamil Nadu") center = [11.0, 78.5];
    else center = l.getBounds().getCenter();

    L.marker(center, {
      icon: L.divIcon({ className: 'state-label', html: `<div>${t(s)}<br>${val}</div>` }),
      interactive: false
    }).addTo(labelLayer);
  });

  // Sidebar Updates
  document.getElementById("totals").innerHTML = `Total: <b>${Object.values(data).reduce((a,b)=>a+b,0)}</b>`;
  let sTotal = 0, nTotal = 0;
  for(let s in data) { if(SOUTH.includes(s)) sTotal += data[s]; else nTotal += data[s]; }
  let sPct = (sTotal/(sTotal+nTotal)*100).toFixed(1);
  document.getElementById("share").innerHTML = `South: ${sPct}% | North: ${(100-sPct).toFixed(1)}%`;
  
  document.getElementById("legend").innerHTML = `<br>🟢 Border = Gain vs Baseline<br>🔵 Border = Loss vs Baseline`;
}

fetch('india_states.geojson').then(r => r.json()).then(g => {
  geoLayer = L.geoJSON(g).addTo(map);
  updateMap();
});

function setLang(v) { document.body.className = v === 'te' ? 'lang-te' : ''; updateMap(); }

const toggleBtn = document.getElementById("toggleBtn");
toggleBtn.onclick = () => {
  const p = document.getElementById("panel");
  const isHidden = p.style.transform === "translateX(-100%)";
  p.style.transform = isHidden ? "translateX(0)" : "translateX(-100%)";
  document.getElementById("map").style.left = isHidden ? "360px" : "0";
  toggleBtn.innerHTML = isHidden ? "⬅" : "➡";
  setTimeout(() => map.invalidateSize(), 300);
};
</script>
</body>
</html>
