<script>

// ================== NORMALIZATION ==================
function normalizeName(name){

    "Orissa":"Odisha"

  return map[name] || (name||"").trim();
}

// ================== LANGUAGE ==================

function t(name){
  let lang = document.getElementById("lang")?.value || "en";
  if(lang === "te") return TELUGU[name] || name;
  return name;
}

const UI = {
  en: {
    total:"Total",
    model:"Model",
    gain:"Biggest Gain",
    loss:"Biggest Loss",
    gainers:"Top Gainers",
    losers:"Top Losers",
    shareTitle:"Share (South vs North)",
    standard:"Standard (incl Delhi & J&K)",
    sensitivity:"Sensitivity (excl Delhi & J&K)",
    south:"South",
    north:"North",
    vote:"Vote Weight (people per MP)",
    validation:"Validation",
    seats:"Seats",
    modelLabel:"Model",
    deltaCurrent:"Δ vs Current",
    deltaUniform:"Δ vs Uniform",
    share:"Share",
    shareDelta:"Share Δ",
    legendGain:"Border = Gain vs baseline",
    legendLoss:"Border = Loss vs baseline",

    legendBase:"Baseline: Uniform vs Current | 2011/2026 vs Uniform"
  },
  te: {
    total:"మొత్తం",

    gain:"అత్యధిక లాభం",
    loss:"అత్యధిక నష్టం",
    gainers:"లాభపడిన రాష్ట్రాలు",
    losers:"నష్టపోయిన రాష్ట్రాలు",
    shareTitle:"వాటా (దక్షిణం vs ఉత్తరం)",
    standard:"సాధారణ (దిల్లీ & జమ్మూ కాశ్మీర్‌తో)",
    sensitivity:"సెన్సిటివిటీ (దిల్లీ & జమ్మూ కాశ్మీర్ లేకుండా)",
    south:"దక్షిణం",
    north:"ఉత్తరం",
    vote:"ఓటు బరువు (ప్రతి ఎంపీకి జనాభా)",
    validation:"ధృవీకరణ",
    seats:"సీట్లు",
    modelLabel:"మోడల్",
    deltaCurrent:"ప్రస్తుతంతో మార్పు",
    deltaUniform:"సమాన పంపిణీంతో మార్పు",
    share:"వాటా",
    shareDelta:"వాటా మార్పు",
    legendGain:"సరిహద్దు = లాభం",
    legendLoss:"సరిహద్దు = నష్టం",
    legendFill:"రంగు = రాష్ట్రం",
    legendBase:"ఆధారం: సమాన పంపిణీ vs ప్రస్తుత"

};

function ui(){
  let lang = document.getElementById("lang")?.value || "en";
  return UI[lang];
}

function getColor(state){
 let hash = 0;
 for(let i=0;i<state.length;i++){ hash = state.charCodeAt(i) + ((hash<<5)-hash); }
 let hue = (hash % 360 + 360) % 360;
 return `hsl(${hue},45%,70%)`;
}

// ================== DATA ==================
const CURRENT = {"Uttar Pradesh":80,"Maharashtra":48,"West Bengal":42,"Bihar":40,"Tamil Nadu":39,"Madhya Pradesh":29,"Karnataka":28,"Gujarat":26,"Andhra Pradesh":25,"Rajasthan":25,"Odisha":21,"Kerala":20,"Telangana":17,"Assam":14,"Jharkhand":14,"Punjab":13,"Chhattisgarh":11,"Haryana":10,"Delhi":7,"Jammu and Kashmir":5,"Himachal Pradesh":4,"Uttarakhand":5,"Goa":2,"Tripura":2,"Meghalaya":2,"Manipur":2,"Nagaland":1,"Arunachal Pradesh":2,"Mizoram":1,"Sikkim":1,"Andaman and Nicobar Islands":1,"Chandigarh":1,"Ladakh":1,"Lakshadweep":1,"Puducherry":1,"Dadra and Nagar Haveli and Daman and Diu":2};
const POP_2011 = {"Uttar Pradesh":199812341,"Maharashtra":112374333,"Bihar":104099452,"West Bengal":91276115,"Madhya Pradesh":72626809,"Tamil Nadu":72147030,"Rajasthan":68548437,"Karnataka":61095297,"Gujarat":60439692,"Andhra Pradesh":49577103,"Telangana":35193978,"Odisha":41974218,"Kerala":33406061,"Jharkhand":32988134,"Assam":31205576,"Punjab":27743338,"Chhattisgarh":25545198,"Haryana":25351462,"Himachal Pradesh":6864602,"Uttarakhand":10086292,"Goa":1458545,"Tripura":3673917,"Meghalaya":2966889,"Manipur":2855794,"Nagaland":1978502,"Arunachal Pradesh":1383727,"Mizoram":1097206,"Sikkim":610577};
const POP_UT = {"Delhi":16787941, "Jammu and Kashmir":12541302,"Ladakh":274000,"Chandigarh":1055450,"Puducherry":1247953,"Lakshadweep":64473,"Andaman and Nicobar Islands":380581,"Dadra and Nagar Haveli and Daman and Diu":586956};

const TOTAL_850 = 850;
const UT_TOTAL = 35;
const STATE_TOTAL = 815;
const SOUTH = ["Tamil Nadu","Kerala","Karnataka","Andhra Pradesh","Telangana"];
const EXCLUDE_SENSITIVITY = ["Delhi","Jammu and Kashmir"];

// ================== CALCS ==================
function allocate(pop,total){
  let sum=Object.values(pop).reduce((a,b)=>a+b,0);
  let base={},rem=[];
  for(let s in pop){
    let q=(pop[s]/sum)*total;
    base[s]=Math.floor(q);
    rem.push({s,frac:q-base[s]});
  }
  let left=total-Object.values(base).reduce((a,b)=>a+b,0);
  rem.sort((a,b)=>b.frac-a.frac);
  for(let i=0;i<left;i++) base[rem[i].s]++;
  return base;
}

function getRatio(pop, totalSeats){
  let sum = Object.values(pop).reduce((a,b)=>a+b,0);
  return sum / totalSeats;
}

function allocateUTSeats(popUT, ratio, targetTotal){
  let base = {};
  let rem = [];
  let used = 0;
  for(let s in popUT){
    base[s] = CURRENT[s] || 1;
    used += base[s];
    let q = popUT[s] / ratio;
    rem.push({s, frac: q});
  }
  let remaining = targetTotal - used;
  rem.sort((a,b)=>b.frac - a.frac);
  let i = 0;
  while(remaining > 0){
    let idx = i % rem.length;
    base[rem[idx].s]++;
    remaining--;
    i++;
  }
  return base;
}

function mergeStatesWithUTs(stateModel, utModel){
  let out = {};
  for(let s in CURRENT){
    if(stateModel && stateModel[s] !== undefined) out[s] = stateModel[s];
    else if(utModel && utModel[s] !== undefined) out[s] = utModel[s];
    else out[s] = CURRENT[s];
  }
  return out;
}

function project2026(){
  let out={};
  for(let s in POP_2011){
    let g=1.18;
    if(s==="Uttar Pradesh"||s==="Bihar") g=1.25;
    if(s==="Tamil Nadu"||s==="Kerala") g=1.08;
    out[s]=Math.round(POP_2011[s]*g);
  }
  return out;
}

// Generate Models
const MODEL_2011_STATES = allocate(POP_2011, STATE_TOTAL);
const UT_2011 = allocateUTSeats(POP_UT, getRatio(POP_2011, STATE_TOTAL), UT_TOTAL);
const MODEL_2011 = mergeStatesWithUTs(MODEL_2011_STATES, UT_2011);

const POP_2026 = project2026();
const MODEL_2026_STATES = allocate(POP_2026, STATE_TOTAL);
const UT_2026 = allocateUTSeats(POP_UT, getRatio(POP_2026, STATE_TOTAL), UT_TOTAL);
const MODEL_2026 = mergeStatesWithUTs(MODEL_2026_STATES, UT_2026);

const CURRENT_STATES = {};
for(let s in CURRENT){ if(s in POP_2011) CURRENT_STATES[s] = CURRENT[s]; }
const UNIFORM_STATES = allocate(CURRENT_STATES, STATE_TOTAL);
const UNIFORM = mergeStatesWithUTs(UNIFORM_STATES, UT_2011);

// ================== MAP & UI ==================
const map = L.map('map',{zoomControl:true, attributionControl:false}).setView([22.5,80],5);
window.map = map;

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer, utLayer = L.layerGroup().addTo(map), labelLayer = L.layerGroup().addTo(map);
let labelTimer;

const UT_BOX={"Delhi":[[28.4,76.9],[28.9,77.5]],"Chandigarh":[[30.6,76.7],[30.8,76.9]],"Puducherry":[[11.8,79.7],[12.0,80.0]],"Lakshadweep":[[10.4,72.5],[10.8,72.8]],"Andaman and Nicobar Islands":[[10,92],[13,94]],"Ladakh":[[33.5,76],[35.5,79]],"Dadra and Nagar Haveli and Daman and Diu":[[20,72.8],[20.4,73.2]]};

fetch('india_states.geojson').then(r=>r.json()).then(g=>{
  geoLayer = L.geoJSON(g,{
    onEachFeature:(f,l)=>{
      l.setStyle({color:"#333",weight:1,fillColor:"#ccc",fillOpacity:0.6});
    }
  }).addTo(map);
  updateMap(false);
});

function updateMap(flag){
  let mode = document.getElementById("mode").value;
  let lang = document.getElementById("lang").value;
  let data = (mode==="current")?CURRENT:(mode==="uniform")?UNIFORM:(mode==="y2011")?MODEL_2011:MODEL_2026;
  let u = UI[lang];

  geoLayer.eachLayer(layer=>{
    let s = normalizeName(layer.feature.properties.ST_NM || layer.feature.properties.NAME_1);
    let val = data[s] || 0;
    layer.setStyle({fillColor:getColor(s), fillOpacity:0.8, weight:2});
    layer.bindTooltip(`<b>${t(s)}</b>: ${val}`,{sticky:true});
  });

  utLayer.clearLayers();
  for(let s in UT_BOX){
    L.rectangle(UT_BOX[s],{color:"#333",weight:2,fillColor:getColor(s),fillOpacity:0.8}).addTo(utLayer);
  }

  // Update Side Panel Info
  document.getElementById("totals").innerHTML = `<b>${u.total}:</b> ${mode==="current"?543:850}`;
  document.getElementById("modelName").innerHTML = `<b>${u.model}:</b> ${mode}`;
  
  let check = 0;
  for(let s in data) check += data[s];
  document.getElementById("validation").innerHTML = `🧪 ${check} / ${mode==="current"?543:850}`;
  
  // Vote Weight Fix
  let popData = (mode==="y2026")?POP_2026:POP_2011;
  let up = Math.round((popData["Uttar Pradesh"]||0)/(data["Uttar Pradesh"]||1));
  let kl = Math.round((popData["Kerala"]||0)/(data["Kerala"]||1));
  document.getElementById("vote").innerHTML = `UP MP ≈ ${up.toLocaleString()}<br>Kerala MP ≈ ${kl.toLocaleString()}`;
}

function setLang(val){
  document.body.classList.toggle("lang-te", val==="te");
  updateMap(false);
}

// ================== DRAG PANEL ==================
function initDragPanel(){
  const panel = document.getElementById("panel");
  if(!panel) return;
  let startY = 0, currentTranslate = 0, isDragging = false;
  const collapsed = -window.innerHeight * 0.65, expanded = 0;

  function setTranslate(y){ panel.style.transform = `translateY(${y}px)`; }

  panel.addEventListener("touchstart", e => {
    isDragging = true;
    startY = e.touches[0].clientY;
    panel.style.transition = "none";
  });

  panel.addEventListener("touchmove", e => {
    if(!isDragging) return;
    let delta = e.touches[0].clientY - startY;
    let next = currentTranslate + delta;
    if(next <= 0 && next >= collapsed) setTranslate(next);
  });

  panel.addEventListener("touchend", e => {
    isDragging = false;
    panel.style.transition = "transform 0.25s ease";
    currentTranslate = (currentTranslate < collapsed/2) ? collapsed : expanded;
    setTranslate(currentTranslate);
  });
}

document.addEventListener("DOMContentLoaded", () => {
  if(window.innerWidth < 768) initDragPanel();
  
  const btn = document.getElementById("toggleBtn");
  btn.onclick = () => {
    const p = document.getElementById("panel");
    const isHidden = p.style.transform === "translateX(-100%)";
    p.style.transform = isHidden ? "translateX(0)" : "translateX(-100%)";
    btn.innerHTML = isHidden ? "⬅" : "➡";
    setTimeout(()=>map.invalidateSize(), 300);
  };
});
