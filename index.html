// ================== HAMILTON ==================
function allocate(pop,total){
  let sum=Object.values(pop).reduce((a,b)=>a+b,0);
  let base={},rem=[];
  for(let s in pop){
    let q=(pop[s]/sum)*total;
    base[s]=Math.floor(q);
    rem.push({s,frac:q-base[s]});
  }
  let left=total-Object.values(base).reduce((a,b)=>a+b,0);
  rem.sort((a,b)=>b.frac-a.frac);
  for(let i=0;i<left;i++) base[rem[i].s]++;
  return base;
}
function buildUTModel(popBase){

  let ratio = getRatio(popBase, STATE_TOTAL); // ratio based on STATES
  return allocateUTSeats(POP_UT, ratio, UT_TOTAL); // exactly 35
}

// 2026 projection
function project2026(){
  let out={};
  for(let s in POP_2011){
    let g=1.18;
    if(s==="Uttar Pradesh"||s==="Bihar") g=1.25;
    if(s==="Tamil Nadu"||s==="Kerala") g=1.08;
    out[s]=Math.round(POP_2011[s]*g);
  }
  return out;
}

// 3️⃣ UT MODEL 

function allocateUTSeats(popUT, ratio, targetTotal){

  let base = {};
  let rem = [];
  let used = 0;

  // Step 1 — lock minimum seats = CURRENT (no loss rule)
  for(let s in popUT){
    base[s] = CURRENT[s] || 1; // fallback 1 if missing
    used += base[s];

    let q = popUT[s] / ratio;
    rem.push({s, frac: q});
  }

  let remaining = targetTotal - used;

  // 🔴 Safety: if baseline already exceeds 35 (rare but possible)
  if(remaining < 0){
    console.warn("Baseline UT seats exceed target 35");
    return base;
  }

  // Step 2 — distribute remaining proportionally
   rem.sort((a,b)=>b.frac - a.frac);

  let i = 0;

  while(remaining > 0){

    let idx = i % rem.length;

    base[rem[idx].s]++;

    remaining--;

    i++;
 }

  return base;
}
// ================== MERGE STATES + UT ==================
function mergeStatesWithUTs(stateModel, utModel){

  let out = {};

  for(let s in CURRENT){

    if(stateModel && stateModel[s] !== undefined){
      out[s] = stateModel[s];
    }
    else if(utModel && utModel[s] !== undefined){
      out[s] = utModel[s];
    }
    else{
      out[s] = CURRENT[s];
    }
  }

  return out;
}
// ✅ NOW CLOSES PROPERLY

function computeShareExcludingDJK(data){

  let total = 0;
  let south = 0;

  for(let s in data){

    if(EXCLUDE_SENSITIVITY.includes(s)) continue;

    if(!(s in POP_2011)) continue;

    total += data[s];

    if(SOUTH.includes(s)) south += data[s];
  }

  return {
    south: (south/total*100),
    north: (100 - (south/total*100))
  };
}
function getRatio(pop, totalSeats){

  let sum = Object.values(pop).reduce((a,b)=>a+b,0);
  return sum / totalSeats;
}

// ================== HELPERS ==================
function getData(m){
  if(m==="current") return CURRENT;
  if(m==="uniform") return UNIFORM;
  if(m==="y2011") return MODEL_2011;
  return MODEL_2026;
}

function getLabel(m){
  return m==="current"?"Current":
         m==="uniform"?"Uniform":
         m==="y2011"?"2011 Census":"2026 Projection";
}

function getLabelTelugu(m){
  return m==="current"?"ప్రస్తుతం":
         m==="uniform"?"సమాన పంపిణీ":
         m==="y2011"?"2011 లెక్కలు":
         "2026 అంచనా";
}

function setLang(lang){
  localStorage.setItem("lang", lang);
  document.getElementById("lang").value = lang;
  updateMap(false);
}

function getModeLabel(value){

  let lang = document.getElementById("lang")?.value || "en";

  if(lang === "te"){
    return value==="current" ? "ప్రస్తుతం (543)" :
           value==="uniform" ? "సమాన పంపిణీ (850)" :
           value==="y2011" ? "2011 లెక్కలు" :
           "2026 అంచనా";
  }

  return value==="current" ? "Current (543)" :
         value==="uniform" ? "Uniform (850)" :
         value==="y2011" ? "2011 Census" :
         "2026 Projection";
}

function formatTop(list, color){
  return list.map((x,i)=>{

    // 🥇🥈🥉 badges
    let badge = "";
    if(i === 0) badge = "🥇";
    else if(i === 1) badge = "🥈";
    else if(i === 2) badge = "🥉";

    // ▲ ▼ arrows
    let arrow = x.diff > 0 ? "▲" : x.diff < 0 ? "▼" : "•";

  let prefix = badge ? `${badge} ${i+1}.` : `${i+1}.`;

  return `${prefix} ${t(x.s)} <span style="color:${color}; font-weight:600">
  ${arrow} ${x.diff>=0?"+":""}${x.diff}
  </span>`;

  }).join("<br>");

}

function detectLanguage(){

  // 1. Check saved preference first

  let saved = localStorage.getItem("lang");

  if(saved) return saved;

  // 2. Detect browser language

  let browserLang = navigator.language || navigator.userLanguage;

  if(browserLang && browserLang.toLowerCase().startsWith("te")){

    return "te";

  }

  return "en";

}


function ui(){
  let lang = document.getElementById("lang")?.value || "en";
  return UI[lang];
}

// 👉 helper (correctly placed)
function isOverlapping(newBox, boxes){
  for(let b of boxes){
    if(
      newBox.x < b.x + b.w &&
      newBox.x + newBox.w > b.x &&
      newBox.y < b.y + b.h &&
      newBox.y + newBox.h > b.y
    ){
      return true;
    }
  }
  return false;
}

function addLabels(data){

  // 🔥 HARD RESET (prevents duplication)
  if(labelLayer){
    map.removeLayer(labelLayer);
  }

  labelLayer = L.layerGroup().addTo(map);

  let zoom = map.getZoom();

  // ================== STATE LABELS ==================
  geoLayer.eachLayer(layer=>{

    let raw = layer.feature.properties.ST_NM || layer.feature.properties.NAME_1;
    let s = normalizeName(raw);

    let center;

    try {
      center = layer.getBounds().getCenter();
      if(!center || !center.lat || !center.lng){
        throw "invalid";
      }
    } catch(e) {

      // fallback centroid
      let coords = layer.feature?.geometry?.coordinates;

      if(coords){
        let latSum = 0, lngSum = 0, count = 0;

        coords.flat(2).forEach(c=>{
          if(Array.isArray(c) && c.length >= 2){
            lngSum += c[0];
            latSum += c[1];
            count++;
          }
        });

        if(count > 0){
          center = L.latLng(latSum/count, lngSum/count);
        }
      }
    }

    if(!center) return;

    let fontSize = zoom >= 6 ? "12px" : "10px";

    let name = zoom < 6
      ? s
      : `${s}<br><span style="font-size:10px; opacity:0.8">${t(s)}</span>`;

    let val = data[s] || 0;

    let label = L.marker(center,{
      interactive:false,
      icon: L.divIcon({
        className:"state-label",
        html: `
          <div style="
            text-align:center;
            font-weight:600;
            font-size:${fontSize};
            color:#111;
            text-shadow:0 0 4px rgba(255,255,255,0.9);
            line-height:1.2;
          ">
            ${name}<br><b>${val}</b>
          </div>
        `
      })
    });

    labelLayer.addLayer(label);
  });

  // ================== UT LABELS ==================
  if(zoom >= 6){

    for(let s in UT_BOX){

      let bounds = UT_BOX[s];

      let center = [
        (bounds[0][0] + bounds[1][0]) / 2,
        (bounds[0][1] + bounds[1][1]) / 2
      ];

      let fontSize = zoom >= 6 ? "11px" : "9px";

      let name = `${s}<br><span style="font-size:10px; opacity:0.8">${t(s)}</span>`;
      let val = data[s] || 0;

      let label = L.marker(center,{
        interactive:false,
        icon: L.divIcon({
          className:"ut-label",
          html: `
            <div style="
              text-align:center;
              font-weight:600;
              font-size:${fontSize};
              color:#000;
              text-shadow:0 0 4px #fff;
            ">
              ${name}<br><b>${val}</b>
            </div>
          `
        })
      });

      labelLayer.addLayer(label);
    }
  }
}

let tip = `<b>${t(s)}</b><br>${u.seats}: ${val}<br>${u.modelLabel}: ${modelLabelText}`;

`${u.gain}: <span class="badge">${t(biggestGain)}</span><br>
 ${u.loss}: <span class="badge">${t(biggestLoss)}</span>`;

// 🏆 Top Movers
if(mode !== "current"){

let south = 0;

// ================== DRAG PANEL ==================
function initDragPanel(){

  const panel = document.getElementById("panel");

  if(!panel) return;

  let startY = 0;
  let currentY = 0;
  let isDragging = false;

  let collapsed = -window.innerHeight * 0.65;
  let mid = -window.innerHeight * 0.35;
  let expanded = 0;

  let currentTranslate = 0;

setTranslate(0);
currentTranslate = 0;

  function setTranslate(y){
    panel.style.transform = `translateY(${y}px)`;
  }

  function onStart(e){
    isDragging = true;
    startY = e.touches ? e.touches[0].clientY : e.clientY;
    panel.style.transition = "none";
  }

  function onMove(e){
    if(!isDragging) return;

    currentY = e.touches ? e.touches[0].clientY : e.clientY;

    let delta = currentY - startY;
    let next = currentTranslate + delta;

    if(next > 0) next = 0;
    if(next < collapsed) next = collapsed;

    setTranslate(next);
  }

  function onEnd(e){
  if(!isDragging) return;
  isDragging = false;

  panel.style.transition = "transform 0.25s ease";

  let delta = currentY - startY;
  let final = currentTranslate + delta;

  let velocity = delta;

  let snap;

  if(velocity > 100){
    snap = collapsed;
  }
  else if(velocity < -100){
    snap = expanded;
  }
  else if(final > -window.innerHeight * 0.2){
    snap = expanded;
  }
  else if(final > -window.innerHeight * 0.5){
    snap = mid;
  }
  else{
    snap = collapsed;
  }

  currentTranslate = snap;
  setTranslate(snap);
}

  panel.addEventListener("touchstart", onStart);
  panel.addEventListener("touchmove", onMove);
  panel.addEventListener("touchend", onEnd);

  panel.addEventListener("mousedown", onStart);
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onEnd);
}

document.addEventListener("DOMContentLoaded", function(){

  let panelOpen = true;

  const btn = document.getElementById("toggleBtn");
  const panel = document.getElementById("panel");
  const mapEl = document.getElementById("map");

  if(!btn || !panel) return;

  // ✅ DEFAULT STATE (runs once)
  if(window.innerWidth >= 768 && mapEl){
    if(window.innerWidth >= 768 && mapEl){
  mapEl.style.left = "320px";
  mapEl.style.width = "calc(100% - 320px)";
}
  }

  // ✅ MAP DOUBLE-CLICK → AUTO HIDE PANEL (desktop only)
  if(mapEl){
    mapEl.addEventListener("dblclick", function(){

      if(window.innerWidth < 768) return;

      if(panelOpen){
        btn.click(); // reuse toggle logic
      }

    });
  }

  // ✅ TOGGLE BUTTON (independent)
btn.onclick = function(){

  if(window.innerWidth < 768) return;

  const isHidden = panel.style.transform === "translateX(-100%)";

  if(isHidden){

    // 👉 EXPAND PANEL
    panel.style.transform = "translateX(0)";

    if(mapEl){
      mapEl.style.left = "320px";
    }

    btn.innerHTML = "⬅";

  } else {

    // 👉 COLLAPSE PANEL
    panel.style.transform = "translateX(-100%)";

    if(mapEl){
      mapEl.style.left = "0";
    }

    btn.innerHTML = "➡";

  }

  setTimeout(()=>{
    if(window.map) window.map.invalidateSize();
  }, 250);

};
