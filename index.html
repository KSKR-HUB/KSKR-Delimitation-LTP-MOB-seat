<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Telugu:wght@400;600&display=swap" rel="stylesheet">

<title>Delimitation Reality Dashboard</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin:0;
  font-family: Arial, Helvetica, sans-serif;
  display:flex;
  height:100vh;
  overflow:hidden;
}

body.lang-te {
  font-family: "Noto Sans Telugu", "Noto Sans", Arial, sans-serif;
}

/* LEFT PANEL */
.panel{
  width:360px;
  background:rgba(255,255,255,0.92);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  padding:14px;
  border-radius:0;
  box-shadow:2px 0 18px rgba(0,0,0,0.15);
  border-right:1px solid rgba(0,0,0,0.06);
  font-size:13px;
  overflow-y:auto;
  -webkit-overflow-scrolling: touch;
}

body.lang-te .panel {
  font-size: 14px;
  line-height: 1.6;
}

@media (max-width: 768px){
  body { flex-direction: column; }
  #map { height: 100vh; width: 100%; position: absolute; top:0; left:0; }
  
  .panel {
    position: fixed;   
    top: auto;
    bottom: 0;
    left: 0;
    right: 0;
    width: 100%;
    height: 75vh;
    padding: 25px 14px 14px;
    background: rgba(255,255,255,0.95);
    border-radius: 16px 16px 0 0;
    box-shadow: 0 -8px 20px rgba(0,0,0,0.15);
    z-index: 1000;
    transform: translateY(calc(75vh - 80px));
    transition: transform 0.3s ease;
    touch-action: pan-y;
  }
  .panel-handle{
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 5px;
    background: #bbb;
    border-radius: 10px;
  }
}

#toggleBtn{
  position: fixed;        
  top: 20px; left: 10px;             
  width: 36px; height: 36px;
  background: #fff;
  border: 1px solid #ddd;
  border-radius: 50%;
  display: flex;
  align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  z-index: 9999;
}

.row{margin-top:6px}
.small{font-size:11px; opacity:0.8}
hr{border:none;border-top:1px solid #eee;margin:10px 0}
.legend{font-size:11px; margin-top:8px}
.badge{display:inline-block; padding:2px 6px; border-radius:6px; background:#f2f2f2}

button, select {
  margin-top:8px; width:100%; padding:8px; border-radius:8px;
  border:1px solid #ddd; background:#fafafa; cursor:pointer;
}

#map { 
    position: absolute; 
    top: 0; 
    left: 0; 
    right: 0; 
    bottom: 0; 
    transition: left 0.3s ease-in-out; 
}

@media (min-width: 768px){
  #panel{
    position: absolute; top: 0; left: 0; bottom: auto;
    width: 320px; height: 100vh; overflow-y: scroll;
    z-index: 1000; border-radius: 0;
    transform: translateX(0) !important; 
  }
  #map{ left: 320px; }
  body.panel-collapsed #panel { transform: translateX(-100%) !important; }
  body.panel-collapsed #map { left: 0; }
}

.state-label div, .ut-label div{
  pointer-events:none; white-space:nowrap; display:block; padding:1px 2px;
}

/* TOP MOVERS POLYGON ANIMATION */
.poly-gainer {
  animation: polyPulseGainer 2s infinite alternate ease-in-out;
}
.poly-loser {
  animation: polyPulseLoser 2s infinite alternate ease-in-out;
}
@keyframes polyPulseGainer {
  0% { filter: drop-shadow(0 0 2px rgba(0,200,83,0.5)); }
  100% { filter: drop-shadow(0 0 12px rgba(0,200,83,1)) brightness(1.1); }
}
@keyframes polyPulseLoser {
  0% { filter: drop-shadow(0 0 2px rgba(30,136,229,0.5)); }
  100% { filter: drop-shadow(0 0 12px rgba(30,136,229,1)) brightness(1.1); }
}

.top-mover-gainer {
  animation: labelPulseGainer 1.5s infinite alternate ease-in-out;
  background: rgba(255,255,255,0.9);
  padding: 2px 6px;
  border-radius: 6px;
  border: 1px solid rgba(0,200,83,0.5);
}
.top-mover-loser {
  animation: labelPulseLoser 1.5s infinite alternate ease-in-out;
  background: rgba(255,255,255,0.9);
  padding: 2px 6px;
  border-radius: 6px;
  border: 1px solid rgba(30,136,229,0.5);
}
@keyframes labelPulseGainer {
  0% { transform: scale(1); box-shadow: 0 0 4px rgba(0,200,83,0.2); }
  100% { transform: scale(1.1); box-shadow: 0 0 12px rgba(0,200,83,0.6); }
}
@keyframes labelPulseLoser {
  0% { transform: scale(1); box-shadow: 0 0 4px rgba(30,136,229,0.2); }
  100% { transform: scale(1.1); box-shadow: 0 0 12px rgba(30,136,229,0.6); }
}
</style>
</head>

<body>
<div id="toggleBtn">⬅</div>
<div class="panel" id="panel">
  <div class="panel-handle"></div>
  <b id="dashTitle">🇮🇳 Delimitation Reality Dashboard</b>

  <div class="row">
    <select id="mode" onchange="updateMap(true)">
      <option value="current" id="opt-current">current model (1971 census)</option>
      <option value="uniform" id="opt-uniform" selected>Uniform model (55% proportionate increase from 1971 census)</option>
      <option value="y2011" id="opt-2011">2011 Census</option>
      <option value="y2026" id="opt-2026">2026 Projection</option>
    </select>
  </div>

  <div class="row small" id="langLabel">Language</div>
  <div class="row">
    <select id="lang" onchange="setLang(this.value)">
      <option value="en">English</option>
      <option value="te">తెలుగు</option>
    </select>
  </div>

  <hr><div id="totals"></div><div id="modelName" class="small"></div>
  <hr><b id="shareTitle">📊 Share</b><div id="share" class="small"></div>
  <hr><b id="voteTitle">⚖️ Vote Weight</b><div id="vote" class="small"></div>
  <hr><b id="insightsTitle">🔥 Key Insights</b><div id="insights" class="small"></div>
  <hr><div id="topMovers" class="small"></div>
  <hr><b id="validationTitle">🧪 Validation</b><div id="validation" class="small"></div>
  <hr><div class="legend" id="legendBox"></div>
</div>

<div id="map"></div>

<script>
function normalizeName(name){
  let n = (name||"").trim();
  const map = {
    "Jammu & Kashmir":"Jammu and Kashmir", "NCT of Delhi":"Delhi",
    "Andaman & Nicobar Islands":"Andaman and Nicobar Islands",
    "Andaman & Nicobar Island":"Andaman and Nicobar Islands", 
    "Andaman & Nicobar":"Andaman and Nicobar Islands",
    "Andaman":"Andaman and Nicobar Islands",
    "Nicobar":"Andaman and Nicobar Islands",
    "Dadra & Nagar Haveli and Daman & Diu":"Dadra and Nagar Haveli and Daman and Diu",
    "Orissa":"Odisha"
  };
  return map[n] || n;
}

  "Telangana":"తెలంగాణ","Kerala":"కేరళ","Odisha":"ఒడిశా","Rajasthan":"రాజస్థాన్",
  "Punjab":"పంజాబ్","Haryana":"హర్యానా","Delhi":"దిల్లీ","Jammu and Kashmir":"జమ్మూ కాశ్మీర్",
  "Ladakh":"లడఖ్","Assam":"అస్సాం","Jharkhand":"ఝార్ఖండ్","Chhattisgarh":"ఛత్తీస్‌గఢ్",
  "Goa":"గోవా","Tripura":"త్రిపుర","Meghalaya":"మేఘాలయ","Manipur":"మణిపూర్",
  "Nagaland":"నాగాలాండ్","Arunachal Pradesh":"అరుణాచల్ ప్రదేశ్","Mizoram":"మిజోరం",
  "Sikkim":"సిక్కిం","Puducherry":"పుదుచ్చేరి","Lakshadweep":"లక్షద్వీప్",
  "Chandigarh":"చండీగఢ్","Andaman and Nicobar Islands":"అండమాన్ నికోబార్ దీవులు",
  "Dadra and Nagar Haveli and Daman and Diu":"దాద్రా నాగర్ హవేలి & దమన్ దియు",
  "Himachal Pradesh": "హిమాచల్ ప్రదేశ్", "Uttarakhand": "ఉత్తరాఖండ్"
};

function t(name){
  let lang = document.getElementById("lang")?.value || "en";
  if(lang === "te") return TELUGU[name] || name;
  return name;
}

const UI = {
  en: {
    total:"Total", model:"Model", gain:"Biggest Gain", loss:"Biggest Loss",
    gainers:"Top Gainers", losers:"Top Losers", shareTitle:"Share (South vs North)",
    standard:"Standard (incl Delhi & J&K)", sensitivity:"Sensitivity (excl Delhi & J&K)",
    south:"South", north:"North", vote:"Vote Weight (people per MP)", validation:"Validation",
    seats:"Seats", modelLabel:"Model", deltaCurrent:"Current", deltaUniform:"Uniform",
    share:"Share", shareDelta:"Share Δ", legendGain:"Border = Gain vs baseline",
    legendLoss:"Border = Loss vs baseline", legendFill:"Fill = State identity",
    legendBase:"Baseline: Uniform vs Current | 2011/2026 vs Uniform",
    optCurrent: "current model (1971 census)",
    optUniform: "Uniform model (55% proportionate increase from 1971 census)",
    opt2011: "2011 Census", opt2026: "2026 Projection"
  },
  te: {
    total:"మొత్తం", model:"మోడల్", gain:"అత్యధిక లాభం", loss:"అత్యధిక నష్టం",
    gainers:"లాభపడిన రాష్ట్రాలు", losers:"నష్టపోయిన రాష్ట్రాలు", shareTitle:"వాటా (దక్షిణం vs ఉత్తరం)",
    standard:"సాధారణ (దిల్లీ & జమ్మూ కాశ్మీర్‌తో)", sensitivity:"సెన్సిటివిటీ (దిల్లీ & జమ్మూ కాశ్మీర్ లేకుండా)",
    south:"దక్షిణం", north:"ఉత్తరం", vote:"ఓటు బరువు (ప్రతి ఎంపీకి జనాభా)", validation:"ధృవీకరణ",
    seats:"సీట్లు", modelLabel:"మోడల్", deltaCurrent:"ప్రస్తుతం", deltaUniform:"సమాన పంపిణీ",
    share:"వాటా", shareDelta:"వాటా మార్పు", legendGain:"సరిహద్దు = లాభం", legendLoss:"సరిహద్దు = నష్టం",
    legendFill:"రంగు = రాష్ట్రం", legendBase:"ఆధారం: సమాన పంపిణీ vs ప్రస్తుత",
    optCurrent: "ప్రస్తుతం (1971 జనాభా లెక్కలు)",
    optUniform: "సమాన పంపిణీ (1971 జనాభా లెక్కల నుండి 55% దామాషా పెంపు)",
    opt2011: "2011 లెక్కలు", opt2026: "2026 అంచనా"
  }
};

function ui(){ return UI[document.getElementById("lang").value || "en"]; }

function getColor(state){
 let hash = 0;
 for(let i=0;i<state.length;i++){ hash = state.charCodeAt(i) + ((hash<<5)-hash); }
 return `hsl(${(hash % 360 + 360) % 360},45%,70%)`;
}

const CURRENT = {
"Uttar Pradesh":80,"Maharashtra":48,"West Bengal":42,"Bihar":40,"Tamil Nadu":39,"Madhya Pradesh":29,"Karnataka":28,"Gujarat":26,"Andhra Pradesh":25,"Rajasthan":25,"Odisha":21,"Kerala":20,"Telangana":17,"Assam":14,"Jharkhand":14,"Punjab":13,"Chhattisgarh":11,"Haryana":10,"Delhi":7,"Jammu and Kashmir":5,"Himachal Pradesh":4,"Uttarakhand":5,"Goa":2,"Tripura":2,"Meghalaya":2,"Manipur":2,"Nagaland":1,"Arunachal Pradesh":2,"Mizoram":1,"Sikkim":1,"Andaman and Nicobar Islands":1,"Chandigarh":1,"Ladakh":1,"Lakshadweep":1,"Puducherry":1,"Dadra and Nagar Haveli and Daman and Diu":2
};

const POP_2011 = {
"Uttar Pradesh":199812341,"Maharashtra":112374333,"Bihar":104099452,"West Bengal":91276115,"Madhya Pradesh":72626809,"Tamil Nadu":72147030,"Rajasthan":68548437,"Karnataka":61095297,"Gujarat":60439692,"Andhra Pradesh":49577103,"Telangana":35193978,"Odisha":41974218,"Kerala":33406061,"Jharkhand":32988134,"Assam":31205576,"Punjab":27743338,"Chhattisgarh":25545198,"Haryana":25351462,"Himachal Pradesh":6864602,"Uttarakhand":10086292,"Goa":1458545,"Tripura":3673917,"Meghalaya":2966889,"Manipur":2855794,"Nagaland":1978502,"Arunachal Pradesh":1383727,"Mizoram":1097206,"Sikkim":610577
};

const POP_UT = {
  "Delhi":16787941, "Jammu and Kashmir":12541302, "Ladakh":274000,
  "Chandigarh":1055450, "Puducherry":1247953, "Lakshadweep":64473,
  "Andaman and Nicobar Islands":380581, "Dadra and Nagar Haveli and Daman and Diu":586956
};

function allocate(pop,total){
  let sum=Object.values(pop).reduce((a,b)=>a+b,0);
  let base={},rem=[];
  for(let s in pop){
    let q=(pop[s]/sum)*total; base[s]=Math.floor(q); rem.push({s,frac:q-base[s]});
  }
  let left=total-Object.values(base).reduce((a,b)=>a+b,0);
  rem.sort((a,b)=>b.frac-a.frac);
  for(let i=0;i<left;i++) base[rem[i].s]++;
  return base;
}

function allocateUTSeats(popUT, targetTotal) {
  let base = {}; let rem = []; let utList = Object.keys(popUT);
  utList.forEach(s => base[s] = 1);
  let extraSeats = targetTotal - utList.length;
  let totalUtPop = Object.values(popUT).reduce((a, b) => a + b, 0);
  utList.forEach(s => {
    let share = (popUT[s] / totalUtPop) * extraSeats;
    let floorShare = Math.floor(share);
    base[s] += floorShare;
    rem.push({ s, frac: share - floorShare });
  });
  let needed = targetTotal - Object.values(base).reduce((a, b) => a + b, 0);
  rem.sort((a, b) => b.frac - a.frac);
  for (let i = 0; i < needed; i++) base[rem[i].s]++;
  return base;
}

function merge(stateModel, utModel){
  let out = {};
  for(let s in CURRENT){
    if(stateModel && stateModel[s] !== undefined) out[s] = stateModel[s];
    else if(utModel && utModel[s] !== undefined) out[s] = utModel[s];
    else out[s] = CURRENT[s];
  }
  return out;
}

const STATE_TOTAL = 815;
const MODEL_2011 = merge(allocate(POP_2011, STATE_TOTAL), allocateUTSeats(POP_UT, 35));
const CURRENT_STATES = {}; for(let s in CURRENT){ if(s in POP_2011) CURRENT_STATES[s] = CURRENT[s]; }
const UNIFORM = merge(allocate(CURRENT_STATES, STATE_TOTAL), allocateUTSeats(POP_UT, 35));

function project2026(){
  let out={};
  for(let s in POP_2011){
    let g=1.18; if(s==="Uttar Pradesh"||s==="Bihar") g=1.25; if(s==="Tamil Nadu"||s==="Kerala") g=1.08;
    out[s]=Math.round(POP_2011[s]*g);
  }
  return out;
}
const MODEL_2026 = merge(allocate(project2026(), STATE_TOTAL), allocateUTSeats(POP_UT, 35));

const map = L.map('map',{zoomControl:true, attributionControl:false}).setView([22.5,80],5);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let geoLayer, utLayer = L.layerGroup().addTo(map), labelLayer = L.layerGroup().addTo(map), labelTimer;

const UT_BOX={
"Delhi":[[28.4,76.9],[28.9,77.5]], "Chandigarh":[[30.6,76.7],[30.8,76.9]], "Puducherry":[[11.8,79.7],[12.0,80.0]], "Lakshadweep":[[10.4,72.5],[10.8,72.8]], "Ladakh":[[33.5,76],[35.5,79]], "Dadra and Nagar Haveli and Daman and Diu":[[20,72.8],[20.4,73.2]]
};

const LABEL_CENTERS = {
  "Kerala": [10.5, 76.5], "Tamil Nadu": [11.0, 78.5], "Karnataka": [14.5, 76.0], "Andhra Pradesh": [16.0, 79.5], "Telangana": [17.5, 79.0], "Maharashtra": [19.0, 76.0], "Odisha": [20.5, 84.5], "Gujarat": [22.8, 71.5], "Madhya Pradesh": [23.5, 78.5], "Chhattisgarh": [21.0, 82.0], "Jharkhand": [23.5, 85.5], "West Bengal": [23.5, 87.8], "Bihar": [25.5, 85.5], "Uttar Pradesh": [27.0, 80.5], "Rajasthan": [26.5, 73.5], "Haryana": [29.0, 76.0], "Punjab": [30.5, 75.5], "Assam": [26.0, 92.5], "Andaman and Nicobar Islands": [11.5, 92.7] 
};

fetch('india_states.geojson').then(r=>r.json()).then(g=>{
  geoLayer = L.geoJSON(g,{ style:{color:"#333", weight:1, fillColor:"#ccc", fillOpacity:0.6} }).addTo(map);
  updateMap(false);
  map.on("zoomend", () => updateMap(false));
});

function getSym(v) { return v > 0 ? "🔺" : v < 0 ? "🔻" : "➖"; }

function addLabels(data, gainerSet, loserSet, diffMap){
  labelLayer.clearLayers();
  let zoom = map.getZoom(), lang = document.getElementById("lang").value;
  geoLayer.eachLayer(layer=>{
    let s = normalizeName(layer.feature.properties.ST_NM || layer.feature.properties.NAME_1);
    let center = LABEL_CENTERS[s] ? L.latLng(LABEL_CENTERS[s][0], LABEL_CENTERS[s][1]) : layer.getBounds().getCenter();
    let isG = gainerSet.has(s), isL = loserSet.has(s);
    let wrapperClass = isG ? "top-mover-gainer" : isL ? "top-mover-loser" : "";
    let metricHtml = (isG || isL) ? `<div style="margin-top:3px; font-size:11px; font-weight:bold; color:${isG?'#00c853':'#1e88e5'}; background:#fff; padding:1px 4px; border-radius:4px; border:1px solid rgba(0,0,0,0.1);">${getSym(diffMap[s])} ${diffMap[s]>0?'+':''}${diffMap[s]}</div>` : "";
    
    L.marker(center,{ interactive:false, icon: L.divIcon({
      className:"state-label",
      html: `<div class="${wrapperClass}" style="text-align:center; font-weight:600; font-size:${zoom>=6?'12px':'10px'}; color:#111; text-shadow:0 0 4px #fff; line-height:1.1;">${t(s)}<br><b>${data[s]||0}</b><br>${metricHtml}</div>`
    })}).addTo(labelLayer);
  });
}

function updateMap(flag){
  let mode = document.getElementById("mode").value, lang = document.getElementById("lang").value;
  let data = (mode==="current")?CURRENT:(mode==="uniform")?UNIFORM:(mode==="y2011")?MODEL_2011:MODEL_2026;
  let u = ui();

  // Fix dropdown text
  document.getElementById("opt-current").innerText = u.optCurrent;
  document.getElementById("opt-uniform").innerText = u.optUniform;
  document.getElementById("opt-2011").innerText = u.opt2011;
  document.getElementById("opt-2026").innerText = u.opt2026;

  let diffs = [];
  for(let s in data){
    if(!(s in POP_2011)) continue;
    let d = data[s] - ((mode==="uniform")?CURRENT[s]:UNIFORM[s]);
    diffs.push({s, d});
  }
  diffs.sort((a,b)=>b.d - a.d);
  let gainerSet = new Set(diffs.slice(0,3).map(x=>x.s)), loserSet = new Set();
  if(mode !== "uniform") loserSet = new Set([...diffs].reverse().slice(0,3).map(x=>x.s));
  let diffMap = {}; diffs.forEach(x => diffMap[x.s] = x.d);

  geoLayer.eachLayer(layer=>{
    let s = normalizeName(layer.feature.properties.ST_NM || layer.feature.properties.NAME_1);
    let val = data[s]||0, d = diffMap[s] || 0;
    let isG = gainerSet.has(s), isL = loserSet.has(s);
    layer.setStyle({fillColor:getColor(s), fillOpacity:0.8, color:d>0?"#00c853":d<0?"#1e88e5":"#999", weight:3, className: isG?"poly-gainer":isL?"poly-loser":""});
    if(isG || isL) layer.bringToFront();
    
    let tip = `<b>${t(s)}</b><br>${u.seats}: ${val}<br>${u.modelLabel}: ${u['opt'+mode.charAt(0).toUpperCase()+mode.slice(1)]}`;
    if(mode !== "current") tip += `<br>${getSym(d)} ${mode==="uniform"?u.deltaCurrent:u.deltaUniform}: ${d>0?'+':''}${d}`;
    layer.bindTooltip(tip,{sticky:true});
  });

  utLayer.clearLayers();
  for(let s in UT_BOX){
    L.rectangle(UT_BOX[s],{ color:"#333", weight:2, fillColor:getColor(s), fillOpacity:0.8 }).addTo(utLayer).bindTooltip(`<b>${t(s)}</b><br>${u.seats}: ${data[s]||0}`,{sticky:true});
  }

  clearTimeout(labelTimer);
  labelTimer = setTimeout(()=>addLabels(data, gainerSet, loserSet, diffMap), 150);

  document.body.classList.toggle("lang-te", lang==="te");
  document.getElementById("totals").innerHTML = `<b>${u.total}:</b> ${(mode==="current")?543:850}`;
  document.getElementById("modelName").innerHTML = `<b>${u.model}:</b> ${u['opt'+mode.charAt(0).toUpperCase()+mode.slice(1)]}`;
  document.getElementById("insights").innerHTML = `${u.gain}: <span class="badge">${t(diffs[0].s)}</span>`;
  
  let moversHtml = `<b>${u.gainers}</b><br>` + diffs.slice(0,3).map((x,i)=>`${i+1}. ${t(x.s)} <span style="color:#00c853">▲ +${x.d}</span>`).join("<br>");
  if(mode !== "uniform" && mode !== "current") moversHtml += `<hr><b>${u.losers}</b><br>` + [...diffs].reverse().slice(0,3).map((x,i)=>`${i+1}. ${t(x.s)} <span style="color:#1e88e5">▼ ${x.d}</span>`).join("<br>");
  document.getElementById("topMovers").innerHTML = (mode==="current") ? "" : moversHtml;
  
  // Vote Weight
  let up = Math.round(project2026()["Uttar Pradesh"]/(data["Uttar Pradesh"]||1));
  let kl = Math.round(project2026()["Kerala"]/(data["Kerala"]||1));
  document.getElementById("vote").innerHTML = `UP MP ≈ ${up.toLocaleString()}<br>Kerala MP ≈ ${kl.toLocaleString()}`;
  document.getElementById("validation").innerHTML = `${u.validation}: ${Object.values(data).reduce((a,b)=>a+b,0)} / ${(mode==="current")?543:850} ✔`;
  document.getElementById("legendBox").innerHTML = `<div>🟢 ${u.legendGain}</div><div>🔵 ${u.legendLoss}</div><div>🎨 ${u.legendFill}</div>`;
}

function setLang(l){ localStorage.setItem("lang",l); updateMap(false); }
document.addEventListener("DOMContentLoaded", () => {
  if(window.innerWidth < 768) {
    const p = document.getElementById("panel");
    p.style.transform = `translateY(calc(75vh - 80px))`;
  }
  document.getElementById("toggleBtn").onclick = () => {
    document.body.classList.toggle('panel-collapsed');
    setTimeout(()=>map.invalidateSize(), 400);
  };
});
</script>
</body>
